<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipes - Torneio Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #000000; color: #ffffff; min-height: 100vh; }
        .gold-text { color: #bf953f; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid rgba(191,149,63,0.2); }
        .btn-gold { background: linear-gradient(135deg, #bf953f, #b38728); color: black; font-weight: 800; transition: all 0.3s; }
        .btn-gold:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(191,149,63,0.4); }
        input[type="text"], select { background: rgba(0,0,0,0.6) !important; border: 1px solid rgba(191,149,63,0.3) !important; color: white !important; outline: none; }
        .color-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: transform 0.2s; }
        .color-dot:hover { transform: scale(1.2); }
        .shield-preview { width: 50px; height: 65px; clip-path: polygon(0 0, 100% 0, 100% 70%, 50% 100%, 0 70%); display: flex; background: #111; margin: 0 auto; }
        .shield-master { width: 45px; height: 60px; clip-path: polygon(0 0, 100% 0, 100% 70%, 50% 100%, 0 70%); display: flex; }
        .shield-inner { flex: 1; display: flex; width: 100%; height: 100%; gap: 1px; }
        .shield-column { flex: 1; height: 100%; }
        .mod-section { border-left: 3px solid #bf953f; padding-left: 1rem; margin-bottom: 2.5rem; }
        .upload-area {
            border: 2px dashed rgba(191,149,63,0.4); border-radius: 1rem;
            padding: 1.2rem; text-align: center; cursor: pointer;
            transition: all 0.3s; position: relative; background: rgba(0,0,0,0.4);
        }
        .upload-area:hover, .upload-area.dragover { border-color: #bf953f; background: rgba(191,149,63,0.06); }
        .upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        #fotoPreview, #mFotoPreview { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #bf953f; display: none; margin: 0 auto 0.5rem; }
        #modalFoto { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 50; align-items: center; justify-content: center; }
        #modalFoto.open { display: flex; }
        .eq-foto { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(191,149,63,0.5); margin-bottom: 6px; }
        .eq-foto-placeholder { width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.04); border: 1px solid rgba(191,149,63,0.2); display: flex; align-items: center; justify-content: center; margin-bottom: 6px; font-size: 10px; color: rgba(255,255,255,0.2); }
        .card-eq { cursor: pointer; transition: all 0.2s; }
        .card-eq:hover { border-color: rgba(191,149,63,0.6) !important; transform: translateY(-2px); }
    </style>
    <base target="_blank">
</head>
<body class="p-4 md:p-10">
<div class="max-w-6xl mx-auto">

    <button onclick="history.back()" class="gold-text uppercase text-xs tracking-widest font-bold hover:underline bg-transparent border-none cursor-pointer">
        <i class="fas fa-arrow-left mr-2"></i> Painel
    </button>

    <!-- CADASTRAR EQUIPE -->
    <div class="glass p-8 rounded-[2.5rem] mt-8 mb-6">
        <h2 class="text-2xl font-black uppercase tracking-tighter mb-6 italic">CADASTRAR <span class="gold-text">EQUIPE</span></h2>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="space-y-4">
                <input type="text" id="eqNome" placeholder="Nome da Equipe" class="w-full p-4 rounded-2xl">
                <select id="eqModalidade" class="w-full p-4 rounded-2xl"><option value="">Carregando...</option></select>
                <div class="upload-area" id="uploadArea"
                     ondragover="event.preventDefault(); this.classList.add('dragover')"
                     ondragleave="this.classList.remove('dragover')"
                     ondrop="handleDrop(event,'fotoInput','fotoPreview','uploadPlaceholder','novo')">
                    <input type="file" id="fotoInput" accept="image/*" onchange="previewFoto(this,'fotoPreview','uploadPlaceholder','novo')">
                    <img id="fotoPreview" src="" alt="Preview">
                    <div id="uploadPlaceholder">
                        <i class="fas fa-camera gold-text text-2xl mb-2 block"></i>
                        <p class="text-xs text-slate-400">Clique ou arraste a foto do escudo/equipe</p>
                        <p class="text-[10px] text-slate-600 mt-1">JPG, PNG — máx. 5MB (opcional)</p>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-2 pt-2">
                    <input type="color" id="manual1" value="#FF0000" oninput="atuManual(1,this.value)" class="w-full h-10 bg-transparent border-none cursor-pointer">
                    <input type="color" id="manual2" value="#FFFFFF" oninput="atuManual(2,this.value)" class="w-full h-10 bg-transparent border-none cursor-pointer">
                    <input type="color" id="manual3" value="#FF0000" oninput="atuManual(3,this.value)" class="w-full h-10 bg-transparent border-none cursor-pointer">
                </div>
            </div>
            <div class="bg-black/40 p-6 rounded-[2rem] border border-white/5">
                <div class="flex justify-around mb-4 text-center">
                    <div class="shield-preview"><div id="pCol1" class="w-full h-full" style="background:#FF0000"></div></div>
                    <div class="shield-preview"><div id="pCol2" class="w-full h-full" style="background:#FFFFFF"></div></div>
                    <div class="shield-preview"><div id="pCol3" class="w-full h-full" style="background:#FF0000"></div></div>
                </div>
                <div id="paletaCores" class="grid grid-cols-5 gap-3 mb-4 justify-items-center"></div>
                <div class="flex justify-center gap-2">
                    <button onclick="setTarget(1)" id="t1" class="text-[9px] bg-white/10 px-3 py-2 rounded-full gold-text border border-[#bf953f]">Esq</button>
                    <button onclick="setTarget(2)" id="t2" class="text-[9px] bg-white/5 px-3 py-2 rounded-full text-slate-400">Meio</button>
                    <button onclick="setTarget(3)" id="t3" class="text-[9px] bg-white/5 px-3 py-2 rounded-full text-slate-400">Dir</button>
                </div>
            </div>
        </div>
        <button onclick="salvar()" id="btn" class="w-full btn-gold py-5 rounded-2xl uppercase text-sm tracking-widest mt-8">SALVAR EQUIPE</button>
    </div>

    <!-- MODAL: ATUALIZAR FOTO DE EQUIPE EXISTENTE -->
    <div id="modalFoto">
        <div class="glass p-8 rounded-[2rem] w-full max-w-md mx-4 relative">
            <button onclick="fecharModal()" class="absolute top-4 right-5 text-slate-400 hover:text-white text-xl"><i class="fas fa-times"></i></button>
            <h3 class="text-lg font-black uppercase italic mb-1">Atualizar <span class="gold-text">Foto</span></h3>
            <p id="mNomeEquipe" class="text-xs text-slate-400 mb-5 uppercase tracking-widest"></p>
            <div class="upload-area"
                 ondragover="event.preventDefault(); this.classList.add('dragover')"
                 ondragleave="this.classList.remove('dragover')"
                 ondrop="handleDrop(event,'mFotoInput','mFotoPreview','mUploadPlaceholder','modal')">
                <input type="file" id="mFotoInput" accept="image/*" onchange="previewFoto(this,'mFotoPreview','mUploadPlaceholder','modal')">
                <img id="mFotoPreview" src="" alt="Preview">
                <div id="mUploadPlaceholder">
                    <i class="fas fa-camera gold-text text-3xl mb-2 block"></i>
                    <p class="text-xs text-slate-400">Clique ou arraste a nova foto</p>
                    <p class="text-[10px] text-slate-600 mt-1">JPG, PNG — máx. 5MB</p>
                </div>
            </div>
            <button onclick="enviarFotoExistente()" id="mBtn" class="w-full btn-gold py-4 rounded-2xl uppercase text-xs tracking-widest mt-5">
                <i class="fas fa-upload mr-2"></i>ENVIAR FOTO
            </button>
        </div>
    </div>

    <!-- LISTA DE EQUIPES -->
    <div id="containerModalidades">
        <p class="text-slate-500 animate-pulse text-center">Organizando equipes...</p>
    </div>

</div>
<script>
    const URL_GS = "https://script.google.com/macros/s/AKfycbxiJPnyx4kC51xJCL26LoPkSumLkE8rHAn4f6DbF66Acy2dLiZbp_-JZjhYJSv6jXQa/exec";
    let cores = ['#FF0000','#FFFFFF','#FF0000'];
    let activeT = 1;
    let fotoBase64Novo = null, fotoNomeNovo = null;
    let fotoBase64Modal = null, fotoNomeModal = null;
    let equipeModalAtual = null;
    const listaCores = ['#FF0000','#0000FF','#FFFFFF','#000000','#FFFF00','#008000','#FFA500','#800080','#FFC0CB','#00FFFF','#8B4513','#708090','#FFD700','#00FF00','#E6E6FA'];

    function init() {
        document.getElementById('paletaCores').innerHTML = listaCores.map(c =>
            `<div class="color-dot" style="background:${c}" onclick="selCor('${c}')"></div>`).join('');
        carregar();
    }

    function setTarget(t) {
        activeT = t;
        [1,2,3].forEach(i => {
            document.getElementById(`t${i}`).className = (i===t)
                ? "text-[9px] bg-white/10 px-3 py-2 rounded-full gold-text border border-[#bf953f]"
                : "text-[9px] bg-white/5 px-3 py-2 rounded-full text-slate-400";
        });
    }

    function selCor(c) { cores[activeT-1]=c; document.getElementById(`manual${activeT}`).value=c; atuPre(); }
    function atuManual(t,c) { cores[t-1]=c; atuPre(); }
    function atuPre() { [1,2,3].forEach(i => document.getElementById(`pCol${i}`).style.backgroundColor=cores[i-1]); }

    function previewFoto(input, previewId, placeholderId, destino) {
        const file = input.files[0];
        if (!file) return;
        if (file.size > 10*1024*1024) { alert("Foto muito grande! Máx. 10MB."); return; }

        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX = 80;
                let w = img.width, h = img.height;
                if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
                else       { w = Math.round(w * MAX / h); h = MAX; }
                canvas.width = w;
                canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);

                let quality = 0.6;
                let dataUrl = canvas.toDataURL('image/jpeg', quality);
                while (dataUrl.length > 5000 && quality > 0.1) {
                    quality -= 0.05;
                    dataUrl = canvas.toDataURL('image/jpeg', quality);
                }

                const base64Puro = dataUrl.split(',')[1];
                if (destino === 'novo') { fotoBase64Novo = base64Puro; fotoNomeNovo = file.name; }
                else                   { fotoBase64Modal = base64Puro; fotoNomeModal = file.name; }

                document.getElementById(previewId).src = e.target.result;
                document.getElementById(previewId).style.display = 'block';
                document.getElementById(placeholderId).style.display = 'none';
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function handleDrop(e, inputId, previewId, placeholderId, destino) {
        e.preventDefault();
        e.currentTarget.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (!file || !file.type.startsWith('image/')) return;
        const dt = new DataTransfer(); dt.items.add(file);
        const input = document.getElementById(inputId);
        input.files = dt.files;
        previewFoto(input, previewId, placeholderId, destino);
    }

    function abrirModal(nomeEquipe) {
        equipeModalAtual = nomeEquipe;
        fotoBase64Modal = null; fotoNomeModal = null;
        document.getElementById('mNomeEquipe').textContent = nomeEquipe;
        document.getElementById('mFotoPreview').style.display = 'none';
        document.getElementById('mUploadPlaceholder').style.display = 'block';
        document.getElementById('mFotoInput').value = '';
        document.getElementById('mBtn').innerHTML = '<i class="fas fa-upload mr-2"></i>ENVIAR FOTO';
        document.getElementById('mBtn').disabled = false;
        document.getElementById('modalFoto').classList.add('open');
    }

    function fecharModal() { document.getElementById('modalFoto').classList.remove('open'); }
    document.getElementById('modalFoto').addEventListener('click', function(e) { if (e.target === this) fecharModal(); });

    async function enviarFotoExistente() {
        if (!fotoBase64Modal) { alert("Selecione uma foto primeiro!"); return; }
        const btn = document.getElementById('mBtn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>ENVIANDO...';
        btn.disabled = true;
        try {
            const res = await fetch(URL_GS, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({
                    aba: 'equipes', acao: 'uploadFoto',
                    equipe: equipeModalAtual,
                    fotoBase64: fotoBase64Modal,
                    fotoNome: fotoNomeModal || 'foto.jpg'
                })
            });
            const data = await res.json();
            if (data.status === 'sucesso') {
                alert(`Foto de "${equipeModalAtual}" atualizada!`);
                fecharModal();
                setTimeout(() => location.reload(), 800);
            } else {
                alert("Erro: " + (data.mensagem || 'resposta inesperada'));
                btn.innerHTML = '<i class="fas fa-upload mr-2"></i>ENVIAR FOTO';
                btn.disabled = false;
            }
        } catch(e) {
            alert("Erro: " + e.message);
            btn.innerHTML = '<i class="fas fa-upload mr-2"></i>ENVIAR FOTO';
            btn.disabled = false;
        }
    }

    async function carregar() {
        try {
            const res = await fetch(URL_GS);
            const data = await res.json();

            document.getElementById('eqModalidade').innerHTML =
                '<option value="">Selecione a Modalidade</option>' +
                (data.esportes || []).slice(1).map(e => `<option value="${e[0]}">${e[0]}</option>`).join('');

            const grupos = {};
            (data.equipes || []).slice(1).forEach(eq => {
                const mod = eq[1];
                if (!grupos[mod]) grupos[mod] = [];
                grupos[mod].push(eq);
            });

            const container = document.getElementById('containerModalidades');
            const mods = Object.keys(grupos);
            if (mods.length === 0) {
                container.innerHTML = '<p class="text-slate-500 text-center">Nenhuma equipe cadastrada.</p>';
                return;
            }

            container.innerHTML = mods.map(mod => `
                <div class="mod-section">
                    <h3 class="text-xl font-black uppercase italic gold-text mb-2">${mod}</h3>
                    <p class="text-[10px] text-slate-500 mb-5"><i class="fas fa-hand-pointer mr-1"></i>Clique em uma equipe para adicionar ou trocar a foto</p>
                    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-4">
                        ${grupos[mod].map(item => {
                            const fotoUrl = (item[5] || '').trim();
                            const temFoto = fotoUrl !== '';
                            return `
                            <div class="glass p-4 rounded-2xl flex flex-col items-center text-center card-eq"
                                 onclick="abrirModal('${item[0].replace(/'/g,"\\'")}')">
                                ${temFoto
                                    ? `<img src="${fotoUrl}" class="eq-foto" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
                                    : ''}
                                <div class="eq-foto-placeholder" ${temFoto ? 'style="display:none"' : ''}>
                                    <i class="fas fa-shield-alt"></i>
                                </div>
                                <div class="shield-master mb-2">
                                    <div class="shield-inner">
                                        <div class="shield-column" style="background:${item[2]}"></div>
                                        <div class="shield-column" style="background:${item[3]}"></div>
                                        <div class="shield-column" style="background:${item[4]}"></div>
                                    </div>
                                </div>
                                <h4 class="font-bold text-[10px] uppercase truncate w-full">${item[0]}</h4>
                                <span class="text-[9px] mt-1 ${temFoto ? 'text-[#bf953f]' : 'text-slate-500'}">
                                    <i class="fas fa-camera mr-1"></i>${temFoto ? 'trocar foto' : 'sem foto'}
                                </span>
                            </div>`;
                        }).join('')}
                    </div>
                </div>
            `).join('');
        } catch(e) { console.error(e); }
    }

    async function salvar() {
        const n = document.getElementById('eqNome').value.trim();
        const m = document.getElementById('eqModalidade').value;
        if (!n || !m) return alert("Preencha o nome e a modalidade!");
        
        const btn = document.getElementById('btn');
        btn.disabled = true;
        
        try {
            btn.innerText = "SALVANDO EQUIPE...";
            
            const res1 = await fetch(URL_GS, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ 
                    aba: 'equipes', 
                    valores: [n, m, cores[0], cores[1], cores[2], ''] 
                })
            });
            
            const data1 = await res1.json();
            
            if (data1.status !== 'sucesso') {
                throw new Error(data1.mensagem || 'Erro ao salvar equipe');
            }

            if (fotoBase64Novo) {
                btn.innerText = "ENVIANDO FOTO...";
                
                const res2 = await fetch(URL_GS, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({
                        aba: 'equipes', 
                        acao: 'uploadFoto',
                        equipe: n, 
                        fotoBase64: fotoBase64Novo, 
                        fotoNome: fotoNomeNovo || 'foto.jpg'
                    })
                });
                
                const data2 = await res2.json();
                
                if (data2.status !== 'sucesso') {
                    console.warn("Foto não enviada:", data2.mensagem);
                }
            }

            alert("Equipe salva com sucesso!");
            setTimeout(() => location.reload(), 1500);
            
        } catch(e) {
            alert("Erro ao salvar: " + e.message);
            btn.innerText = "SALVAR EQUIPE";
            btn.disabled = false;
        }
    }

    init();
</script>
</body>
</html>
