<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificação - Torneio Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Poppins',sans-serif; background-color:#000000; color:#ffffff; min-height:100vh; }
        .gold-text { color:#bf953f; }
        .glass { background:rgba(255,255,255,0.03); backdrop-filter:blur(15px); border:1px solid rgba(191,149,63,0.2); }
        table { width:100%; border-collapse:collapse; }
        th { background:rgba(191,149,63,0.1); color:#bf953f; text-transform:uppercase; padding:15px; font-size:10px; letter-spacing:1px; }
        td { padding:15px; border-bottom:1px solid rgba(255,255,255,0.05); text-align:center; font-size:13px; }
        .shield-mini { width:12px; height:12px; border-radius:50%; display:inline-block; margin-right:8px; vertical-align:middle; }
        .mod-title { border-left:3px solid #bf953f; padding-left:15px; margin:30px 0 15px 0; font-style:italic; }
        .pos-1 { color:#ffd700; font-weight:800; }
        .pos-2 { color:#c0c0c0; font-weight:800; }
        .pos-3 { color:#cd7f32; font-weight:800; }
        select { background:rgba(0,0,0,0.6); border:1px solid rgba(191,149,63,0.3); color:white; outline:none; }
    </style>
<base target="_blank">
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <a href="index.html" onclick="event.preventDefault(); window.location.href='index.html'; return false;" class="gold-text uppercase text-xs font-bold hover:underline">
                    <i class="fas fa-arrow-left mr-2"></i> Painel Principal
                </a>
                <h1 class="text-3xl font-black uppercase mt-2 italic">QUADRO DE <span class="gold-text">CLASSIFICAÇÃO</span></h1>
            </div>
            <div class="flex flex-col md:flex-row gap-3 w-full md:w-auto">
                <!-- Filtro por Evento -->
                <select id="selEvento" onchange="atualizarInterface()" class="bg-black border border-[#bf953f]/30 p-3 rounded-xl text-xs uppercase font-bold outline-none w-full md:w-56">
                    <option value="TODOS">Todos os Eventos</option>
                </select>
                <!-- Filtro por Modalidade -->
                <select id="selMod" onchange="atualizarInterface()" class="bg-black border border-[#bf953f]/30 p-3 rounded-xl text-xs uppercase font-bold outline-none w-full md:w-64">
                    <option value="TODAS">Ver Todas as Modalidades</option>
                </select>
            </div>
        </div>

        <div class="glass p-4 rounded-xl mb-8 text-[10px] text-slate-400">
            <span class="gold-text font-bold uppercase">Critérios de Desempate:</span>
            1º Pontos → 2º Vitórias → 3º Saldo de Gols → 4º Gols Pró → 5º Confronto Direto
        </div>

        <div id="containerTabelas" class="space-y-12"></div>
    </div>

    <script>
        // ============================================================
        // ESTRUTURA DA ABA "tabela":
        // [0]=evento [1]=modalidade [2]=data [3]=horario
        // [4]=equipeA [5]=equipeB [6]=placarA [7]=placarB
        // [8]=ptsA [9]=ptsB
        // ============================================================
        const URL_GS = "https://script.google.com/macros/s/AKfycbxiJPnyx4kC51xJCL26LoPkSumLkE8rHAn4f6DbF66Acy2dLiZbp_-JZjhYJSv6jXQa/exec";
        let db = {};

        async function carregarDados() {
            try {
                const res = await fetch(URL_GS);
                db = await res.json();

                // Popular select de modalidades
                const selMod = document.getElementById('selMod');
                (db.esportes || []).slice(1).forEach(e => {
                    const opt = document.createElement('option');
                    opt.value = e[0]; opt.textContent = e[0];
                    selMod.appendChild(opt);
                });

                // Popular select de eventos (a partir dos dados reais da tabela)
                const selEvento = document.getElementById('selEvento');
                const eventos = [...new Set(
                    (db.tabela || []).slice(1)
                        .map(j => String(j[0] || '').trim())
                        .filter(Boolean)
                )];
                eventos.forEach(ev => {
                    const opt = document.createElement('option');
                    opt.value = ev; opt.textContent = ev;
                    selEvento.appendChild(opt);
                });

                atualizarInterface();
            } catch (e) { console.error("Erro:", e); }
        }

        function toNum(valor) {
            const n = Number(String(valor).trim());
            return isNaN(n) ? 0 : n;
        }

        // ─── cálculo de estatísticas ─────────────────────────────────
        // filtroEvento: '' = todos, senão filtra pelo nome do evento
        function calcularEstatistica(modalidade, filtroEvento) {
            const equipes = (db.equipes || []).slice(1).filter(e => e[1] === modalidade);

            // Filtrar jogos pela modalidade [1] e pelo evento [0] se necessário
            const jogos = (db.tabela || []).slice(1).filter(j => {
                const modOk = j[1] === modalidade;
                const evOk  = !filtroEvento || String(j[0]).trim() === filtroEvento;
                return modOk && evOk;
            });

            let stats = {};
            equipes.forEach(e => {
                stats[e[0]] = {
                    nome: e[0], pj:0, v:0, e:0, d:0,
                    gp:0, gc:0, sg:0, pts:0, cor: e[2] || '#333'
                };
            });

            let confrontosDiretos = {};

            jogos.forEach(j => {
                const tA = String(j[4] || '').trim();   // equipeA=[4]
                const tB = String(j[5] || '').trim();   // equipeB=[5]
                const gA = toNum(j[6]);                  // placarA=[6]
                const gB = toNum(j[7]);                  // placarB=[7]

                if (!stats[tA] || !stats[tB]) return;

                // Verificar se o placar foi preenchido
                const strA = (j[6]===undefined||j[6]===null||String(j[6]).trim()==='') ? '' : String(j[6]).trim();
                const strB = (j[7]===undefined||j[7]===null||String(j[7]).trim()==='') ? '' : String(j[7]).trim();
                if (strA==='' || strB==='') return;

                // Confronto direto
                confrontosDiretos[tA+'___'+tB] = { gp:gA, gc:gB };
                confrontosDiretos[tB+'___'+tA] = { gp:gB, gc:gA };

                // Estatísticas
                stats[tA].pj++; stats[tB].pj++;
                stats[tA].gp += gA; stats[tA].gc += gB;
                stats[tB].gp += gB; stats[tB].gc += gA;
                stats[tA].sg = stats[tA].gp - stats[tA].gc;
                stats[tB].sg = stats[tB].gp - stats[tB].gc;

                // Pontos
                if (gA > gB) {
                    stats[tA].pts += 3; stats[tA].v++;
                    stats[tB].d++;
                } else if (gB > gA) {
                    stats[tB].pts += 3; stats[tB].v++;
                    stats[tA].d++;
                } else {
                    stats[tA].pts += 1; stats[tA].e++;
                    stats[tB].pts += 1; stats[tB].e++;
                }
            });

            // Ordenação com desempate
            const times = Object.values(stats);
            times.sort((a, b) => {
                if (b.pts !== a.pts) return b.pts - a.pts;
                if (b.v   !== a.v)   return b.v   - a.v;
                if (b.sg  !== a.sg)  return b.sg  - a.sg;
                if (b.gp  !== a.gp)  return b.gp  - a.gp;

                const confA = confrontosDiretos[a.nome+'___'+b.nome];
                const confB = confrontosDiretos[b.nome+'___'+a.nome];
                if (confA && confB) {
                    let ptsA=0, ptsB=0;
                    if(confA.gp>confA.gc) ptsA=3; else if(confA.gp===confA.gc) ptsA=1;
                    if(confB.gp>confB.gc) ptsB=3; else if(confB.gp===confB.gc) ptsB=1;
                    if(ptsA!==ptsB) return ptsB-ptsA;
                    const sgA=confA.gp-confA.gc, sgB=confB.gp-confB.gc;
                    if(sgA!==sgB) return sgB-sgA;
                    if(confA.gp!==confB.gp) return confB.gp-confA.gp;
                }
                return 0;
            });

            return times;
        }

        function atualizarInterface() {
            const filtroMod    = document.getElementById('selMod').value;
            const filtroEvento = document.getElementById('selEvento').value;
            const eventoFiltro = filtroEvento === 'TODOS' ? '' : filtroEvento;

            const container = document.getElementById('containerTabelas');
            container.innerHTML = '';

            const mods = filtroMod === 'TODAS'
                ? (db.esportes || []).slice(1).map(e => e[0])
                : [filtroMod];

            mods.forEach(mod => {
                const rank = calcularEstatistica(mod, eventoFiltro);
                if (rank.length === 0) return;

                // Verificar se há ao menos algum jogo com dados para essa combinação
                const temJogos = (db.tabela||[]).slice(1).some(j => {
                    const modOk = j[1] === mod;
                    const evOk  = !eventoFiltro || String(j[0]).trim() === eventoFiltro;
                    return modOk && evOk;
                });
                if (!temJogos && eventoFiltro) return;

                const section = document.createElement('div');
                section.innerHTML = `
                    <h2 class="mod-title text-sm font-black uppercase gold-text tracking-widest">${mod}</h2>
                    ${eventoFiltro ? `<p class="text-[9px] text-slate-500 uppercase tracking-widest mb-3 ml-4">Evento: ${eventoFiltro}</p>` : ''}
                    <div class="glass rounded-2xl overflow-hidden">
                        <table>
                            <thead>
                                <tr>
                                    <th class="w-12">#</th>
                                    <th class="text-left">Equipe</th>
                                    <th>PJ</th>
                                    <th>V</th>
                                    <th>E</th>
                                    <th>D</th>
                                    <th>GP</th>
                                    <th>GC</th>
                                    <th>SG</th>
                                    <th class="gold-text">PTS</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rank.map((s, i) => `
                                    <tr>
                                        <td class="font-bold ${i<3?'pos-'+(i+1):'text-slate-500'}">${i+1}º</td>
                                        <td class="text-left font-bold uppercase text-[11px]">
                                            <div class="shield-mini" style="background:${s.cor}"></div>${s.nome}
                                        </td>
                                        <td>${s.pj}</td>
                                        <td>${s.v}</td>
                                        <td>${s.e}</td>
                                        <td>${s.d}</td>
                                        <td>${s.gp}</td>
                                        <td>${s.gc}</td>
                                        <td class="${s.sg>0?'text-green-400':s.sg<0?'text-red-400':''}">${s.sg>0?'+'+s.sg:s.sg}</td>
                                        <td class="font-black text-white text-lg">${s.pts}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
                container.appendChild(section);
            });

            if (container.innerHTML === '') {
                container.innerHTML = '<p class="text-slate-500 text-center py-10">Nenhum dado para exibir.</p>';
            }
        }

        carregarDados();
    </script>
</body>
</html>
