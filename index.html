<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneio Master - Elite Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #000000; color: #ffffff; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .gold-gradient { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(191, 149, 63, 0.2); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); height: 100%; }
        .glass-card:hover { background: rgba(191, 149, 63, 0.12); border: 1px solid rgba(191, 149, 63, 0.7); transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .bg-glow { position: fixed; top: -10%; left: 50%; transform: translateX(-50%); width: 100%; height: 800px; background: radial-gradient(circle, rgba(191, 149, 63, 0.12) 0%, rgba(0,0,0,0) 70%); z-index: -1; }
        .icon-box { background: linear-gradient(145deg, #0a0a0a, #1a1a1a); box-shadow: 5px 5px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="max-w-6xl w-full px-6 py-12">
        <header class="text-center mb-16">
            <i class="fas fa-trophy text-7xl text-[#bf953f] mb-6 drop-shadow-[0_0_15px_rgba(191,149,63,0.5)]"></i>
            <h1 class="text-5xl md:text-7xl font-extrabold uppercase tracking-tighter leading-none">
                TORNEIO <span class="gold-gradient">MASTER</span>
            </h1>
            <div class="h-[2px] w-24 bg-[#bf953f] mx-auto mt-6 rounded-full shadow-[0_0_10px_#bf953f]"></div>
            <p class="text-slate-500 mt-6 tracking-[0.4em] text-xs uppercase font-light">Elite Management System</p>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <a href="esportes.html" class="glass-card p-10 rounded-[2.5rem] text-center group">
                <div class="w-20 h-20 mx-auto mb-5 flex items-center justify-center rounded-2xl icon-box border border-amber-500/20 group-hover:border-amber-500/60 transition-all">
                    <i class="fas fa-running text-3xl text-[#bf953f]"></i>
                </div>
                <h3 class="text-xs font-bold uppercase tracking-[0.15em] leading-relaxed group-hover:text-[#fcf6ba] transition">ESPORTES/<br>MODALIDADES</h3>
            </a>
            <a href="equipes.html" class="glass-card p-10 rounded-[2.5rem] text-center group">
                <div class="w-20 h-20 mx-auto mb-5 flex items-center justify-center rounded-2xl icon-box border border-amber-500/20 group-hover:border-amber-500/60 transition-all">
                    <i class="fas fa-shield-alt text-3xl text-[#bf953f]"></i>
                </div>
                <h3 class="text-xs font-bold uppercase tracking-[0.15em] group-hover:text-[#fcf6ba] transition">EQUIPES</h3>
            </a>
            <a href="jogadores.html" class="glass-card p-10 rounded-[2.5rem] text-center group">
                <div class="w-20 h-20 mx-auto mb-5 flex items-center justify-center rounded-2xl icon-box border border-amber-500/20 group-hover:border-amber-500/60 transition-all">
                    <i class="fas fa-user-plus text-3xl text-[#bf953f]"></i>
                </div>
                <h3 class="text-xs font-bold uppercase tracking-[0.15em] leading-relaxed group-hover:text-[#fcf6ba] transition">JOGADORES/<br>INSCRIÇÃO</h3>
            </a>
            <a href="cronograma.html" class="glass-card p-10 rounded-[2.5rem] text-center group">
                <div class="w-20 h-20 mx-auto mb-5 flex items-center justify-center rounded-2xl icon-box border border-amber-500/20 group-hover:border-amber-500/60 transition-all">
                    <i class="fas fa-calendar-alt text-3xl text-[#bf953f]"></i>
                </div>
                <h3 class="text-xs font-bold uppercase tracking-[0.15em] leading-relaxed group-hover:text-[#fcf6ba] transition">CRONOGRAMA DE<br>JOGOS</h3>
            </a>
            <a href="tabela.html" class="glass-card p-10 rounded-[2.5rem] text-center group">
                <div class="w-20 h-20 mx-auto mb-5 flex items-center justify-center rounded-2xl icon-box border border-amber-500/20 group-hover:border-amber-500/60 transition-all">
                    <i class="fas fa-random text-3xl text-[#bf953f]"></i>
                </div>
                <h3 class="text-xs font-bold uppercase tracking-[0.15em] leading-relaxed group-hover:text-[#fcf6ba] transition">GERAR<br>CONFRONTOS</h3>
            </a>
            <a href="classificacao.html" class="glass-card p-10 rounded-[2.5rem] text-center group">
                <div class="w-20 h-20 mx-auto mb-5 flex items-center justify-center rounded-2xl icon-box border border-amber-500/20 group-hover:border-amber-500/60 transition-all">
                    <i class="fas fa-poll text-3xl text-[#bf953f]"></i>
                </div>
                <h3 class="text-xs font-bold uppercase tracking-[0.15em] leading-relaxed group-hover:text-[#fcf6ba] transition">CLASSIFICAÇÃO E<br>RESULTADO</h3>
            </a>
        </div>

        <footer class="mt-20 text-center">
            <div class="h-[1px] w-64 bg-gradient-to-r from-transparent via-amber-500/30 to-transparent mx-auto mb-6"></div>
            <p class="text-[10px] tracking-[0.5em] text-slate-700 uppercase font-medium">Premium Tournament Management</p>
        </footer>
    </div>
</body>
</html>
