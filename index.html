<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneio Master - Elite Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #050505; color: #ffffff; }
        .gold-gradient { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(191, 149, 63, 0.2); transition: all 0.4s ease; }
        .glass-card:hover { background: rgba(191, 149, 63, 0.1); border: 1px solid rgba(191, 149, 63, 0.6); transform: translateY(-5px); }
        .bg-glow { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; height: 600px; background: radial-gradient(circle, rgba(191, 149, 63, 0.1) 0%, rgba(0,0,0,0) 70%); z-index: -1; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
    <div class="bg-glow"></div>
    <div class="max-w-5xl w-full">
        <header class="text-center mb-12">
            <i class="fas fa-trophy text-5xl text-[#bf953f] mb-4"></i>
            <h1 class="text-5xl font-extrabold uppercase tracking-tighter">TORNEIO <span class="gold-gradient">MASTER</span></h1>
            <p class="text-slate-400 mt-2 tracking-[0.2em] text-xs uppercase">Elite Management System</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <a href="esportes.html" class="glass-card p-8 rounded-3xl text-center">
                <i class="fas fa-running text-3xl text-[#bf953f] mb-4"></i>
                <h3 class="text-lg font-bold uppercase tracking-wider">Esportes</h3>
            </a>
            <a href="equipes.html" class="glass-card p-8 rounded-3xl text-center">
                <i class="fas fa-shield-alt text-3xl text-[#bf953f] mb-4"></i>
                <h3 class="text-lg font-bold uppercase tracking-wider">Equipes</h3>
            </a>
            <a href="jogadores.html" class="glass-card p-8 rounded-3xl text-center">
                <i class="fas fa-user-friends text-3xl text-[#bf953f] mb-4"></i>
                <h3 class="text-lg font-bold uppercase tracking-wider">Jogadores</h3>
            </a>
            <a href="tabela.html" class="glass-card p-8 rounded-3xl text-center">
                <i class="fas fa-calendar-alt text-3xl text-[#bf953f] mb-4"></i>
                <h3 class="text-lg font-bold uppercase tracking-wider">Tabela de Jogos</h3>
            </a>
            <a href="confrontos.html" class="glass-card p-8 rounded-3xl text-center">
                <i class="fas fa-sitemap text-3xl text-[#bf953f] mb-4"></i>
                <h3 class="text-lg font-bold uppercase tracking-wider">Confrontos</h3>
            </a>
            <a href="config.html" class="glass-card p-8 rounded-3xl text-center">
                <i class="fas fa-cogs text-3xl text-[#bf953f] mb-4"></i>
                <h3 class="text-lg font-bold uppercase tracking-wider">Configurações</h3>
            </a>
        </div>
    </div>
</body>
</html>
