<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><title>Esportes - Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body{background:#050505;color:white;font-family:sans-serif;}.glass{background:rgba(255,255,255,0.03);border:1px solid rgba(191,149,63,0.2);}</style>
</head>
<body class="p-6 flex flex-col items-center">
    <div class="max-w-md w-full">
        <a href="index.html" style="color:#bf953f">← Voltar</a>
        <div class="glass p-8 rounded-3xl mt-6">
            <h2 class="text-2xl font-bold mb-6 uppercase tracking-wider">Novo <span style="color:#bf953f">Esporte</span></h2>
            <input type="text" id="espNome" placeholder="Ex: Futsal" class="w-full bg-black border border-amber-500/30 p-4 rounded-xl mb-4 outline-none">
            <button onclick="salvar()" id="btn" class="w-full bg-[#bf953f] text-black font-bold p-4 rounded-xl uppercase">Cadastrar</button>
        </div>
    </div>
    <script>
        const URL = "https://script.google.com/macros/s/AKfycbwS6YpnBBgOmrvagK7KcQ9qZGQZCsemOyVAEFxreOdNiN1C64E0oE6eFlDGibrC7FXl/exec";
        async function salvar() {
            const v = document.getElementById('espNome').value;
            if(!v) return;
            document.getElementById('btn').innerText = "Salvando...";
            await fetch(URL, {method:'POST', mode:'no-cors', body:JSON.stringify({aba:'esportes', valores:[v]})});
            alert("Sucesso!");
            location.reload();
        }
    </script>
</body>
</html>
