<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronograma - Torneio Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Poppins',sans-serif; background-color:#000000; color:#ffffff; min-height:100vh; }
        .gold-text { color:#bf953f; }
        .glass { background:rgba(255,255,255,0.03); backdrop-filter:blur(15px); border:1px solid rgba(191,149,63,0.2); }
        .timeline-item { position:relative; padding-left:2rem; border-left:2px solid rgba(191,149,63,0.3); margin-bottom:1.5rem; }
        .timeline-item::before { content:''; position:absolute; left:-7px; top:8px; width:12px; height:12px; background:#bf953f; border-radius:50%; box-shadow:0 0 10px #bf953f; }
        .tag-mod { font-size:9px; padding:2px 8px; border-radius:4px; text-transform:uppercase; font-weight:800; }

        .placar-display { cursor:pointer; padding:4px 12px; border-radius:8px; transition:all 0.2s; }
        .placar-display:hover { background:rgba(191,149,63,0.1); }
        .placar-form { display:flex; align-items:center; gap:6px; }
        .placar-form input { 
            width:45px; 
            background:rgba(0,0,0,0.6); 
            border:1px solid rgba(191,149,63,0.4); 
            color:#fff; 
            text-align:center; 
            font-size:1rem; 
            font-weight:800; 
            border-radius:6px;
            padding:4px;
        }
        .placar-form input:focus { border-color:#22c55e; outline:none; }
        .btn-salvar { background:#22c55e; color:#000; border:none; padding:4px 10px; border-radius:6px; font-size:10px; font-weight:800; cursor:pointer; }
        .btn-salvar:hover { background:#16a34a; }
        .msg-salvo { color:#22c55e; font-size:10px; margin-left:6px; }

        .btn-acao { padding:4px 10px; border-radius:6px; font-size:9px; font-weight:700; text-transform:uppercase; cursor:pointer; border:none; transition:all 0.2s; }
        .btn-saltar { background:rgba(239,68,68,0.15); color:#f87171; border:1px solid rgba(239,68,68,0.3); }
        .btn-saltar:hover { background:rgba(239,68,68,0.3); }
        .btn-saltar.ativo { background:rgba(239,68,68,0.4); color:#fff; }
        .jogo-saltado { opacity:0.4; text-decoration:line-through; }
        .a-definir { color:#666; font-style:italic; font-size:10px; }

        .escudo { width:28px; height:36px; position:relative; flex-shrink:0; clip-path:polygon(50% 100%, 0 75%, 0 0, 100% 0, 100% 75%); border-radius:2px 2px 0 0; overflow:hidden; }
        .escudo-faixa { position:absolute; top:0; bottom:0; width:33.33%; }
        .escudo-faixa:nth-child(1) { left:0; }
        .escudo-faixa:nth-child(2) { left:33.33%; }
        .escudo-faixa:nth-child(3) { left:66.66%; width:33.34%; }

        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); z-index:50; display:none; align-items:center; justify-content:center; padding:20px; }
        .modal-overlay.ativo { display:flex; }
        .modal-content { background:#0a0a0a; border:1px solid rgba(191,149,63,0.3); border-radius:24px; padding:32px; max-width:500px; width:100%; max-height:90vh; overflow-y:auto; }

        .pts-badge { font-size:9px; font-weight:800; padding:2px 7px; border-radius:4px; text-transform:uppercase; }
        .pts-win  { background:rgba(34,197,94,0.2);  color:#4ade80; border:1px solid rgba(34,197,94,0.4); }
        .pts-draw { background:rgba(234,179,8,0.2);  color:#facc15; border:1px solid rgba(234,179,8,0.4); }
        .pts-loss { background:rgba(239,68,68,0.2);  color:#f87171; border:1px solid rgba(239,68,68,0.4); }
        .pts-none { background:rgba(100,116,139,0.15); color:#64748b; border:1px solid rgba(100,116,139,0.2); }

        .fase-badge { font-size:8px; padding:2px 6px; border-radius:3px; text-transform:uppercase; font-weight:700; letter-spacing:0.05em; }
        .fase-semi { background:rgba(168,85,247,0.2); color:#c084fc; border:1px solid rgba(168,85,247,0.4); }
        .fase-final { background:rgba(234,179,8,0.2); color:#facc15; border:1px solid rgba(234,179,8,0.4); }
        .fase-terceiro { background:rgba(100,116,139,0.2); color:#94a3b8; border:1px solid rgba(100,116,139,0.4); }
        .fase-grupos { background:rgba(59,130,246,0.2); color:#60a5fa; border:1px solid rgba(59,130,246,0.4); }
        .fase-quartas { background:rgba(239,68,68,0.2); color:#f87171; border:1px solid rgba(239,68,68,0.4); }

        .auto-filled { animation: pulseGold 2s ease-in-out; }
        @keyframes pulseGold {
            0%, 100% { box-shadow: 0 0 0 0 rgba(191,149,63,0); }
            50% { box-shadow: 0 0 15px 3px rgba(191,149,63,0.3); }
        }

        /* --- MODAL DE CORES --- */
        .mod-cor-row { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
        .mod-cor-row:last-child { border-bottom:none; }
        .mod-cor-nome { flex:1; font-size:12px; font-weight:700; text-transform:uppercase; }
        .preview-tag { font-size:9px; padding:3px 10px; border-radius:4px; font-weight:800; text-transform:uppercase; }
        input[type="color"].cor-picker { width:40px; height:40px; border:none; border-radius:10px; cursor:pointer; padding:2px; background:transparent; }
        .btn-cores { background:rgba(168,85,247,0.15); color:#c084fc; border:1px solid rgba(168,85,247,0.3); }
        .btn-cores:hover { background:rgba(168,85,247,0.3); }

        /* --- CARD INTERVALO --- */
        .intervalo-card {
            position: relative;
            padding-left: 2rem;
            border-left: 2px solid rgba(14,165,233,0.3);
            margin-bottom: 1.5rem;
        }
        .intervalo-card::before {
            content: '';
            position: absolute;
            left: -7px; top: 8px;
            width: 12px; height: 12px;
            background: #0ea5e9;
            border-radius: 50%;
            box-shadow: 0 0 10px #0ea5e9;
        }
        .intervalo-inner {
            background: rgba(14,165,233,0.06);
            border: 1px solid rgba(14,165,233,0.2);
            border-radius: 16px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .intervalo-hora { font-size: 1.2rem; font-weight: 900; color: #38bdf8; line-height: 1; }
        .intervalo-label { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.15em; color: #38bdf8; background: rgba(14,165,233,0.15); border: 1px solid rgba(14,165,233,0.3); padding: 3px 10px; border-radius: 4px; }
        .intervalo-duracao { font-size: 11px; color: #64748b; font-weight: 600; }
        .btn-del-intervalo { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.25); border-radius: 6px; font-size: 10px; padding: 4px 8px; cursor: pointer; }
        .btn-del-intervalo:hover { background: rgba(239,68,68,0.3); }

        /* --- NOVOS ESTILOS PARA O MODO EVENTO GERAL --- */
        .btn-evento-geral { 
            background: transparent; color: #fbbf24; border: 2px solid #fbbf24; 
            border-radius: 12px; font-size: 14px; font-weight: 800; padding: 6px 16px;
        }
        .btn-evento-geral:hover { background: #fbbf24; color: #000; }
        .btn-evento-geral.ativo { background: #fbbf24; color: #000; }

        .grid-evento-geral { display: flex; gap: 2rem; align-items: flex-start; margin-bottom: 4rem; }
        .col-jogos { flex: 1.2; }
        .col-classif { flex: 1; position: sticky; top: 20px; }

        .tab-classif-mini { width: 100%; border-collapse: separate; border-spacing: 0 6px; font-size: 11px; }
        .tab-classif-mini th { color: #64748b; text-transform: uppercase; padding: 8px; font-weight: 800; text-align: center; }
        .tab-classif-mini td { padding: 10px 8px; text-align: center; background: rgba(255,255,255,0.02); }
        .tab-classif-mini tr td:first-child { border-radius: 8px 0 0 8px; font-weight: 900; color: #fbbf24; }
        .tab-classif-mini tr td:last-child { border-radius: 0 8px 8px 0; font-weight: 900; background: rgba(251,191,36,0.05); }

        /* --- BOTÃO IMPRIMIR --- */
        .btn-imprimir { background:rgba(255,255,255,0.08); color:#e2e8f0; border:1px solid rgba(255,255,255,0.2); }
        .btn-imprimir:hover { background:rgba(255,255,255,0.15); }

        /* --- ESTILOS DE IMPRESSÃO --- */
        @media print {
            @page { size: A4; margin: 1.5cm; }

            body {
                background-color: #ffffff !important;
                color: #000000 !important;
                font-size: 11px !important;
            }

            /* Ocultar elementos desnecessários na impressão */
            #areaFiltros,
            .flex.gap-3.mb-6,
            .btn-saltar,
            .btn-salvar,
            .btn-del-intervalo,
            #btnEventoGeral,
            a[href="index.html"],
            .modal-overlay,
            .placar-form {
                display: none !important;
            }

            /* Remover fundos escuros */
            .glass {
                background: #f8f8f8 !important;
                border: 1px solid #ddd !important;
                backdrop-filter: none !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            /* Texto escuro */
            body, span, div, p, h1, h2, h3 {
                color: #000 !important;
            }
            .gold-text { color: #8a6d00 !important; }
            .text-slate-500 { color: #555 !important; }
            .text-slate-400 { color: #666 !important; }

            /* Manter cores dos badges */
            .tag-mod, .fase-badge, .pts-badge, .intervalo-label {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            /* Linha do tempo */
            .timeline-item { border-left-color: #888 !important; }
            .timeline-item::before { background: #8a6d00 !important; box-shadow: none !important; }

            /* Intervalo */
            .intervalo-card { border-left-color: #0ea5e9 !important; }
            .intervalo-card::before { background: #0ea5e9 !important; box-shadow: none !important; }
            .intervalo-inner {
                background: #e8f5fd !important;
                border-color: #0ea5e9 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .intervalo-hora, .intervalo-label, .intervalo-duracao { color: #005f8a !important; }

            /* Não quebrar card no meio da página */
            .timeline-item, .intervalo-card { page-break-inside: avoid; }
            .section-dia { page-break-inside: avoid; }

            /* Divisor de data */
            .section-dia .flex.items-center.gap-4 div { background: transparent !important; }
            h2.gold-text { background: transparent !important; color: #8a6d00 !important; }

            /* Classificação */
            .tab-classif-mini th { color: #333 !important; }
            .tab-classif-mini td { background: #f5f5f5 !important; }

            /* Escudos */
            .escudo-faixa {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            /* Layout geral */
            .max-w-7xl { max-width: 100% !important; }
            .grid-evento-geral { flex-direction: column; }
            .col-classif { position: static !important; }
        }

    </style>
<base target="_blank">
</head>
<body class="p-4 md:p-10">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <a href="index.html" onclick="event.preventDefault(); window.location.href='index.html'; return false;" class="gold-text uppercase text-xs tracking-widest font-bold hover:underline">
                <i class="fas fa-arrow-left mr-2"></i> Voltar
            </a>
            <div class="text-right">
                <h1 class="text-3xl font-black italic tracking-tighter uppercase">CRONOGRAMA <span class="gold-text">GERAL</span></h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest">Clique no placar para editar</p>
            </div>
        </div>

        <div id="areaFiltros" class="glass p-4 rounded-xl mb-6 flex flex-wrap gap-4 items-end">
            <div class="flex-1 min-w-[180px]">
                <label class="text-[10px] uppercase text-slate-500 font-bold block mb-1">Filtrar por Evento</label>
                <select id="selEvento" onchange="aplicarFiltro()" class="w-full p-2 rounded-xl bg-black/60 border border-amber-500/30 text-white text-xs font-bold uppercase outline-none">
                    <option value="">Todos os Eventos</option>
                </select>
            </div>
            <div class="flex-1 min-w-[180px]">
                <label class="text-[10px] uppercase text-slate-500 font-bold block mb-1">Filtrar por Modalidade</label>
                <select id="selModalidade" onchange="aplicarFiltro()" class="w-full p-2 rounded-xl bg-black/60 border border-amber-500/30 text-white text-xs font-bold uppercase outline-none">
                    <option value="">Todas as Modalidades</option>
                </select>
            </div>
        </div>

        <div class="flex gap-3 mb-6 flex-wrap items-center">
            <button onclick="abrirModalAddJogo()" class="btn-acao" style="background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.3);">
                <i class="fas fa-plus mr-1"></i> Adicionar Jogo
            </button>
            <button onclick="abrirModalIntervalo()" class="btn-acao" style="background:rgba(14,165,233,0.12);color:#38bdf8;border:1px solid rgba(14,165,233,0.3);">
                <i class="fas fa-coffee mr-1"></i> Intervalo
            </button>
            <button onclick="toggleSaltados()" class="btn-acao" style="background:rgba(100,116,139,0.15);color:#94a3b8;border:1px solid rgba(100,116,139,0.3);">
                <i class="fas fa-eye mr-1"></i> <span id="txtToggleSaltados">Mostrar Saltados</span>
            </button>
            <button onclick="window.location.reload()" class="btn-acao" style="background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.3);">
                <i class="fas fa-sync mr-1"></i> Atualizar
            </button>

            <button onclick="window.print()" class="btn-acao btn-imprimir">
                <i class="fas fa-print mr-1"></i> Imprimir
            </button>

            <button onclick="abrirModalCores()" class="btn-acao btn-cores">
                <i class="fas fa-palette mr-1"></i> Cores
            </button>

            <button id="btnEventoGeral" onclick="toggleModoEventoGeral()" class="btn-evento-geral ml-auto">
                VER EVENTO GERAL
            </button>
        </div>

        <div id="cronogramaLista">
            </div>
    </div>

    <div id="modalAddJogo" class="modal-overlay">
        <div class="modal-content">
            <h3 class="text-xl font-black uppercase tracking-tighter mb-6 italic gold-text">
                <i class="fas fa-plus-circle mr-2"></i>Adicionar Jogo
            </h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase text-slate-500 font-bold">Evento</label>
                    <input type="text" id="addEvento" placeholder="Nome do Evento" class="w-full p-3 mt-1 rounded-xl bg-black/60 border border-amber-500/30 text-white">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-slate-500 font-bold">Modalidade</label>
                    <select id="addModalidade" class="w-full p-3 mt-1 rounded-xl bg-black/60 border border-amber-500/30 text-white" onchange="atualizarSelectsEquipes()"></select>
                </div>
                <div>
                    <label class="text-[10px] uppercase text-slate-500 font-bold">Fase</label>
                    <select id="addFase" class="w-full p-3 mt-1 rounded-xl bg-black/60 border border-amber-500/30 text-white" onchange="onFaseChange()">
                        <option value="Fase de Grupos">Fase de Grupos</option>
                        <option value="Quartas de Final">Quartas de Final</option>
                        <option value="Semi-Final">Semi-Final</option>
                        <option value="Final">Final</option>
                        <option value="Disputa 3º Lugar">Disputa 3º Lugar</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] uppercase text-slate-500 font-bold">Data</label>
                    <input type="date" id="addData" class="w-full p-3 mt-1 rounded-xl bg-black/60 border border-amber-500/30 text-white">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-slate-500 font-bold">Horário</label>
                    <input type="time" id="addHorario" class="w-full p-3 mt-1 rounded-xl bg-black/60 border border-amber-500/30 text-white">
                </div>
                <!-- Painel semi-final automatico -->
                <div id="painelSemiAuto" style="display:none; background:rgba(168,85,247,0.08); border:1px solid rgba(168,85,247,0.3); border-radius:14px; padding:14px;">
                    <div style="color:#c084fc; font-size:10px; font-weight:800; text-transform:uppercase; margin-bottom:8px;">
                        <i class="fas fa-magic" style="margin-right:4px;"></i> Times preenchidos pela classificação atual
                    </div>
                    <div id="previewSemis" style="font-size:12px; color:#e2e8f0;">Carregando...</div>
                    <p style="color:#64748b; font-size:9px; margin-top:8px;">* Serão criados 2 jogos de semi-final automaticamente.</p>
                </div>
                <!-- Selecao manual (oculta na semi) -->
                <div id="painelTimesManual">
                    <div style="margin-bottom:16px;">
                        <label class="text-[10px] uppercase text-slate-500 font-bold">Equipe A</label>
                        <select id="addEquipeA" class="w-full p-3 mt-1 rounded-xl bg-black/60 border border-amber-500/30 text-white">
                            <option value="">A DEFINIR</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase text-slate-500 font-bold">Equipe B</label>
                        <select id="addEquipeB" class="w-full p-3 mt-1 rounded-xl bg-black/60 border border-amber-500/30 text-white">
                            <option value="">A DEFINIR</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="fecharModalAddJogo()" class="flex-1 py-3 rounded-xl bg-slate-800 text-white text-xs font-bold uppercase">Cancelar</button>
                <button onclick="confirmarAddJogo()" class="flex-1 py-3 rounded-xl bg-gradient-to-r from-amber-600 to-amber-500 text-black text-xs font-bold uppercase">Adicionar</button>
            </div>
        </div>
    </div>

    <!-- Modal Cores das Modalidades -->
    <div id="modalCores" class="modal-overlay">
        <div class="modal-content">
            <h3 class="text-xl font-black uppercase tracking-tighter mb-2 italic gold-text">
                <i class="fas fa-palette mr-2"></i>Cores das Modalidades
            </h3>
            <p class="text-[10px] text-slate-500 mb-6 uppercase tracking-widest">Escolha uma cor para cada modalidade</p>
            <div id="listaCoresModal"></div>
            <div class="flex gap-3 mt-6">
                <button onclick="fecharModalCores()" class="flex-1 py-3 rounded-xl bg-slate-800 text-white text-xs font-bold uppercase">Fechar</button>
                <button onclick="salvarCoresModal()" class="flex-1 py-3 rounded-xl bg-gradient-to-r from-purple-600 to-purple-500 text-white text-xs font-bold uppercase">
                    <i class="fas fa-save mr-1"></i> Salvar Cores
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Intervalo -->
    <div id="modalIntervalo" class="modal-overlay">
        <div class="modal-content">
            <h3 class="text-xl font-black uppercase tracking-tighter mb-6 italic" style="color:#38bdf8">
                <i class="fas fa-coffee mr-2"></i>Adicionar Intervalo
            </h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase text-slate-500 font-bold">Data</label>
                    <input type="date" id="intData" class="w-full p-3 mt-1 rounded-xl bg-black/60 border border-sky-500/30 text-white">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-slate-500 font-bold">Horário de Início</label>
                    <input type="time" id="intHora" class="w-full p-3 mt-1 rounded-xl bg-black/60 border border-sky-500/30 text-white">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-slate-500 font-bold">Duração (minutos)</label>
                    <input type="number" id="intDuracao" min="5" max="120" value="30" placeholder="30" class="w-full p-3 mt-1 rounded-xl bg-black/60 border border-sky-500/30 text-white text-center font-bold text-lg">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-slate-500 font-bold">Descrição (opcional)</label>
                    <input type="text" id="intDesc" placeholder="ex: Almoço, Descanso..." class="w-full p-3 mt-1 rounded-xl bg-black/60 border border-sky-500/30 text-white">
                </div>
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="fecharModalIntervalo()" class="flex-1 py-3 rounded-xl bg-slate-800 text-white text-xs font-bold uppercase">Cancelar</button>
                <button onclick="confirmarIntervalo()" class="flex-1 py-3 rounded-xl text-black text-xs font-bold uppercase" style="background:linear-gradient(to right,#0284c7,#38bdf8)">
                    <i class="fas fa-check mr-1"></i> Adicionar
                </button>
            </div>
        </div>
    </div>

    <script>
        const URL_GS = "https://script.google.com/macros/s/AKfycbxiJPnyx4kC51xJCL26LoPkSumLkE8rHAn4f6DbF66Acy2dLiZbp_-JZjhYJSv6jXQa/exec";

        let cacheEscudos = {};
        let jogosGlobal = [];
        let dadosGlobais = {};
        let mostrarSaltados = false;
        let modoEventoGeral = false;
        let intervalosGlobal = []; // Intervalos visuais (não salvos na planilha)

        function toggleModoEventoGeral() {
            modoEventoGeral = !modoEventoGeral;
            const btn = document.getElementById('btnEventoGeral');
            const filtros = document.getElementById('areaFiltros');
            
            if (modoEventoGeral) {
                btn.classList.add('ativo');
                filtros.style.display = 'none';
            } else {
                btn.classList.remove('ativo');
                filtros.style.display = 'flex';
            }
            aplicarFiltro();
        }

        // --- TODAS AS SUAS FUNÇÕES ORIGINAIS PRESERVADAS ABAIXO ---

        function limparHora(valor) {
            if (!valor || valor === '') return '--:--';
            const s = String(valor).trim();
            const match = s.match(/^(\d{1,2}):\d{2}/);
            if (match) {
                const hora = match[1].padStart(2, '0');
                const minutos = s.match(/:\d{2}/)[0].slice(1);
                return hora + ':' + minutos;
            }
            if (!isNaN(s) && s.includes('.')) {
                const totalMinutos = Math.round(parseFloat(s) * 24 * 60);
                const h = String(Math.floor(totalMinutos / 60)).padStart(2, '0');
                const m = String(totalMinutos % 60).padStart(2, '0');
                return h + ':' + m;
            }
            return s;
        }

        function limparData(valor) {
            if (!valor || valor === '') return '';
            const s = String(valor).trim();
            if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
            const matchBR = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
            if (matchBR) {
                let dia = matchBR[1].padStart(2, '0');
                let mes = matchBR[2].padStart(2, '0');
                let ano = matchBR[3];
                if (ano.length === 2) ano = parseInt(ano) >= 50 ? '19' + ano : '20' + ano;
                return ano + '-' + mes + '-' + dia;
            }
            if (s.includes('T')) return s.substring(0, 10);
            return s;
        }

        function formatarDataExibicao(dataStr) {
            try {
                const [ano, mes, dia] = dataStr.split('-').map(Number);
                const d = new Date(ano, mes - 1, dia);
                return d.toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });
            } catch(e) { return dataStr; }
        }

        function criarEscudo(nomeTime) {
            if (!nomeTime) return '';
            const escudo = cacheEscudos[nomeTime.trim()];
            if (!escudo) return '';
            return `
                <div class="escudo" title="${nomeTime}">
                    <div class="escudo-faixa" style="background-color:${escudo.cor1};"></div>
                    <div class="escudo-faixa" style="background-color:${escudo.cor2};"></div>
                    <div class="escudo-faixa" style="background-color:${escudo.cor3};"></div>
                </div>
            `;
        }

        function formatarPlacar(valorA, valorB) {
            const strA = String(valorA !== undefined && valorA !== null ? valorA : '').trim();
            const strB = String(valorB !== undefined && valorB !== null ? valorB : '').trim();
            if (strA === '' && strB === '') return '-';
            return `${strA} x ${strB}`;
        }

        function formatarNomeTime(nome) {
            if (!nome || String(nome).trim() === '') return '<span class="a-definir">A DEFINIR</span>';
            return String(nome).trim();
        }

        function ptsBadge(pts) {
            const v = String(pts).trim();
            if (v === '') return `<span class="pts-badge pts-none">—</span>`;
            const n = Number(v);
            if (n === 3) return `<span class="pts-badge pts-win">3 pts</span>`;
            if (n === 1) return `<span class="pts-badge pts-draw">1 pt</span>`;
            return `<span class="pts-badge pts-loss">0 pts</span>`;
        }

        function faseBadge(fase) {
            const f = String(fase || '').trim().toLowerCase();
            if (f === 'final') return `<span class="fase-badge fase-final"><i class="fas fa-trophy mr-1"></i>Final</span>`;
            if (f === 'disputa 3º lugar' || f === 'disputa 3o lugar') return `<span class="fase-badge fase-terceiro"><i class="fas fa-medal mr-1"></i>3º Lugar</span>`;
            if (f === 'semi-final') return `<span class="fase-badge fase-semi"><i class="fas fa-chess-knight mr-1"></i>Semi</span>`;
            if (f === 'quartas de final') return `<span class="fase-badge fase-quartas"><i class="fas fa-expand mr-1"></i>Quartas</span>`;
            if (f === 'fase de grupos') return `<span class="fase-badge fase-grupos"><i class="fas fa-users mr-1"></i>Grupos</span>`;
            return '';
        }

        // --- SISTEMA DE CORES PERSONALIZÁVEIS POR MODALIDADE ---
        const PALETA_PADRAO = [
            '#bf953f', '#22c55e', '#60a5fa', '#f87171', '#c084fc',
            '#fb923c', '#34d399', '#f472b6', '#38bdf8', '#a3e635'
        ];
        let mapaCores = {};

        function carregarCoresSalvas() {
            try {
                const salvas = localStorage.getItem('coresMod');
                if (salvas) mapaCores = JSON.parse(salvas);
            } catch(e) {}
        }

        function salvarCoresStorage() {
            try { localStorage.setItem('coresMod', JSON.stringify(mapaCores)); } catch(e) {}
        }

        function hexParaRgba(hex, alpha) {
            const r = parseInt(hex.slice(1,3),16);
            const g = parseInt(hex.slice(3,5),16);
            const b = parseInt(hex.slice(5,7),16);
            return `rgba(${r},${g},${b},${alpha})`;
        }

        function corDaModalidade(mod) {
            const k = String(mod || '').trim().toLowerCase();
            if (!k) return { bg: hexParaRgba('#bf953f',0.18), text:'#bf953f', border: hexParaRgba('#bf953f',0.4) };
            if (!mapaCores[k]) {
                const idx = Object.keys(mapaCores).length % PALETA_PADRAO.length;
                mapaCores[k] = PALETA_PADRAO[idx];
                salvarCoresStorage();
            }
            const hex = mapaCores[k];
            return { bg: hexParaRgba(hex, 0.18), text: hex, border: hexParaRgba(hex, 0.5) };
        }

        function abrirModalCores() {

        function removerIntervalo(id) {

        function gerarHtmlIntervalo(intv) {
            // Calcular hora de término
            const [h, m] = intv.hora.split(':').map(Number);
            const totalMin = h * 60 + m + intv.duracao;
            const hFim = String(Math.floor(totalMin / 60) % 24).padStart(2, '0');

        // --- NOVA FUNÇÃO PARA CALCULAR CLASSIFICAÇÃO EM TEMPO REAL ---
        function calcularClassificacao(jogos) {
            let tabela = {};
            jogos.forEach(j => {
                const timeA = String(j.dados[4] || '').trim();
                const timeB = String(j.dados[5] || '').trim();
                const gA = j.dados[6];
                const gB = j.dados[7];

                if (!timeA || !timeB || gA === '' || gB === '') return;

                [timeA, timeB].forEach(t => {
                    if (!tabela[t]) tabela[t] = { nome: t, pj: 0, v: 0, e: 0, d: 0, gp: 0, gc: 0, sg: 0, pts: 0 };
                });

                tabela[timeA].pj++; tabela[timeB].pj++;
                tabela[timeA].gp += Number(gA); tabela[timeA].gc += Number(gB);
                tabela[timeB].gp += Number(gB); tabela[timeB].gc += Number(gA);

                if (Number(gA) > Number(gB)) { tabela[timeA].v++; tabela[timeA].pts += 3; tabela[timeB].d++; }
                else if (Number(gB) > Number(gA)) { tabela[timeB].v++; tabela[timeB].pts += 3; tabela[timeA].d++; }
                else { tabela[timeA].e++; tabela[timeB].e++; tabela[timeA].pts += 1; tabela[timeB].pts += 1; }
            });

            return Object.values(tabela).map(t => { t.sg = t.gp - t.gc; return t; })
                .sort((a,b) => b.pts - a.pts || b.sg - a.sg || b.gp - a.gp);
        }

        function aplicarFiltro() {
            const ev  = document.getElementById('selEvento').value;
            const mod = document.getElementById('selModalidade').value;
            let filtrados = jogosGlobal;
            if (ev)  filtrados = filtrados.filter(j => String(j.dados[0]).trim() === ev);
            if (mod) filtrados = filtrados.filter(j => String(j.dados[1]).trim() === mod);
            renderizar(filtrados);
        }

        // Função de Renderizar Unificada
        function renderizar(jogos) {
            const container = document.getElementById('cronogramaLista');
            const visiveis = mostrarSaltados ? jogos : jogos.filter(j => !j.saltado);

            if (modoEventoGeral) {
                // AGRUPAMENTO POR EVENTO + MODALIDADE (IMAGEM 2)
                const grupos = {};
                visiveis.forEach(j => {
                    const chave = `${String(j.dados[0]).trim()} - ${String(j.dados[1]).trim()}`;
                    if (!grupos[chave]) grupos[chave] = [];
                    grupos[chave].push(j);
                });

                let htmlFinal = '';
                Object.keys(grupos).forEach(titulo => {
                    const classif = calcularClassificacao(grupos[titulo]);
                    
                    htmlFinal += `
                        <div class="grid-evento-geral">
                            <div class="col-jogos">
                                <h2 class="gold-text font-black uppercase italic mb-6 flex items-center gap-3">
                                    <div class="w-1 h-5 bg-amber-500"></div> ${titulo}
                                </h2>
                                <div class="space-y-4">
                                    ${grupos[titulo].map(j => gerarHtmlCard(j)).join('')}
                                </div>
                            </div>
                            <div class="col-classif glass p-6 rounded-3xl">
                                <table class="tab-classif-mini">
                                    <thead>
                                        <tr><th>#</th><th class="text-left">EQUIPE</th><th>PJ</th><th>SG</th><th>PTS</th></tr>
                                    </thead>
                                    <tbody>
                                        ${classif.map((t, i) => `
                                            <tr>
                                                <td>${i+1}º</td>
                                                <td class="text-left font-bold flex items-center gap-2">${criarEscudo(t.nome)} ${t.nome}</td>
                                                <td>${t.pj}</td>
                                                <td class="${t.sg>0?'text-green-500':''}">${t.sg>0?'+'+t.sg:t.sg}</td>
                                                <td>${t.pts}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = htmlFinal || '<p class="text-center text-slate-500 py-20">Selecione um evento para visualizar.</p>';

            } else {
                // VISUALIZAÇÃO ORIGINAL POR DATA
                const porData = {};
                visiveis.forEach(j => {
                    const dk = limparData(j.dados[2]);
                    if (!dk) return;
                    if (!porData[dk]) porData[dk] = [];
                    porData[dk].push(j);
                });

                const datas = Object.keys(porData).sort();
                let html = '';
                datas.forEach(dk => {
                    // Ordenar jogos do dia por horário
                    porData[dk].sort((a, b) => {
                        const horaA = limparHora(a.dados[3]);
                        const horaB = limparHora(b.dados[3]);
                        if (horaA === '--:--') return 1;
                        if (horaB === '--:--') return -1;
                        return horaA.localeCompare(horaB);
                    });

                    // Montar itens misturados: jogos + intervalos do dia
                    const intervalosHoje = intervalosGlobal.filter(i => i.data === dk);
                    const todosItens = [
                        ...porData[dk].map(j => ({ tipo: 'jogo', hora: limparHora(j.dados[3]), dados: j })),
                        ...intervalosHoje.map(i => ({ tipo: 'intervalo', hora: i.hora, dados: i }))
                    ].sort((a, b) => {
                        if (a.hora === '--:--') return 1;
                        if (b.hora === '--:--') return -1;
                        return a.hora.localeCompare(b.hora);
                    });

                    const itensHtml = todosItens.map(item =>
                        item.tipo === 'jogo' ? gerarHtmlCard(item.dados) : gerarHtmlIntervalo(item.dados)
                    ).join('');

                    html += `
                        <div class="mb-12 section-dia">
                            <div class="flex items-center gap-4 mb-8">
                                <div class="h-[1px] flex-1 bg-white/10"></div>
                                <h2 class="text-sm font-bold gold-text uppercase tracking-[0.3em] bg-black px-4 italic">${formatarDataExibicao(dk)}</h2>
                                <div class="h-[1px] flex-1 bg-white/10"></div>
                            </div>
                            <div class="space-y-3">
                                ${itensHtml}
                            </div>
                        </div>
                    `;
                });

                // Adicionar intervalos em datas sem jogos
                const datasComJogos = new Set(Object.keys(porData));
                const datasSoIntervalo = [...new Set(intervalosGlobal.map(i => i.data))].filter(d => !datasComJogos.has(d)).sort();
                datasSoIntervalo.forEach(dk => {
                    const itensHtml = intervalosGlobal.filter(i => i.data === dk)
                        .sort((a,b) => a.hora.localeCompare(b.hora))
                        .map(i => gerarHtmlIntervalo(i)).join('');
                    html += `
                        <div class="mb-12 section-dia">
                            <div class="flex items-center gap-4 mb-8">
                                <div class="h-[1px] flex-1 bg-white/10"></div>
                                <h2 class="text-sm font-bold gold-text uppercase tracking-[0.3em] bg-black px-4 italic">${formatarDataExibicao(dk)}</h2>
                                <div class="h-[1px] flex-1 bg-white/10"></div>
                            </div>
                            <div class="space-y-3">${itensHtml}</div>
                        </div>`;
                });

                container.innerHTML = html || '<p class="text-center text-slate-500 py-20">Nenhum jogo para exibir.</p>';
            }
        }

        // Função auxiliar para gerar o HTML do Card (mantendo sua estrutura exata)
        function gerarHtmlCard(j) {
            const saltadoClass = j.saltado ? 'jogo-saltado' : '';
            const c = corDaModalidade(j.dados[1]);

        // --- Lógica de Edição Original ---
        window.editarPlacar = function(linhaIdx) {
            const jogo = jogosGlobal.find(j => j.linha === linhaIdx);
            const container = document.getElementById('placar-container-' + linhaIdx);
            const pA = (jogo.dados[6] === '') ? '' : jogo.dados[6];
            const pB = (jogo.dados[7] === '') ? '' : jogo.dados[7];

            container.innerHTML = `
                <div class="placar-form">
                    <input type="number" id="inp-a-${linhaIdx}" value="${pA}" placeholder="0">
                    <input type="number" id="inp-b-${linhaIdx}" value="${pB}" placeholder="0">
                    <button class="btn-salvar" onclick="salvarPlacar(${linhaIdx})"><i class="fas fa-check"></i></button>
                </div>`;
        };

        window.salvarPlacar = async function(linhaIdx) {
            const inpA = document.getElementById('inp-a-' + linhaIdx);
            const inpB = document.getElementById('inp-b-' + linhaIdx);
            const nA = inpA.value === '' ? 0 : parseInt(inpA.value);
            const nB = inpB.value === '' ? 0 : parseInt(inpB.value);

            const jogo = jogosGlobal.find(j => j.linha === linhaIdx);
            jogo.dados[6] = nA; jogo.dados[7] = nB;
            if (nA > nB) { jogo.dados[8] = 3; jogo.dados[9] = 0; }
            else if (nB > nA) { jogo.dados[8] = 0; jogo.dados[9] = 3; }
            else { jogo.dados[8] = 1; jogo.dados[9] = 1; }

            aplicarFiltro();

            await fetch(URL_GS, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ aba: 'tabela', acao: 'atualizar', linha: linhaIdx + 2, placarA: nA, placarB: nB })
            });

            // Se for semi-final, recarrega dados do Sheets para atualizar Final/3o Lugar
            const faseAtual = String(jogo.dados[10] || '').trim().toLowerCase();
            if (faseAtual === 'semi-final' || faseAtual === 'semi' || faseAtual === 'semifinal') {
                await new Promise(r => setTimeout(r, 1500));
                try {
                    const res = await fetch(URL_GS + '?t=' + Date.now());
                    const data = await res.json();
                    const novaTabela = data.tabela.slice(1);
                    jogosGlobal.forEach(j => {
                        const fase = String(j.dados[10] || '').trim().toLowerCase();
                        if (fase === 'final' || fase === 'disputa 3º lugar' || fase === 'disputa 3o lugar' || fase === '3º lugar') {
                            const nd = novaTabela[j.linha];
                            if (nd) { j.dados[4] = nd[4]; j.dados[5] = nd[5]; }
                        }
                    });
                    aplicarFiltro();
                } catch(e) { console.error('Erro ao recarregar pos semi:', e); }
            }
        };

        function toggleSaltar(l) { const j = jogosGlobal.find(x => x.linha === l); j.saltado = !j.saltado; aplicarFiltro(); }
        function toggleSaltados() { mostrarSaltados = !mostrarSaltados; document.getElementById('txtToggleSaltados').textContent = mostrarSaltados ? 'Ocultar Saltados' : 'Mostrar Saltados'; aplicarFiltro(); }

        // --- Modais e Carregamento (Originais) ---
        function abrirModalAddJogo() {
            const modal = document.getElementById('modalAddJogo');
            const mods = (dadosGlobais.esportes || []).slice(1).map(e => e[0]);
            document.getElementById('addModalidade').innerHTML = mods.map(m => `<option value="${m}">${m}</option>`).join('');

        function atualizarSelectsEquipes() {
            const mod = document.getElementById('addModalidade').value;
            const eqs = (dadosGlobais.equipes || []).slice(1).filter(e => e[1] === mod).map(e => e[0]);
            const opts = '<option value="">A DEFINIR</option>' + eqs.map(e => `<option value="${e}">${e}</option>`).join('');
            document.getElementById('addEquipeA').innerHTML = opts;
            document.getElementById('addEquipeB').innerHTML = opts;
            onFaseChange();
        }

        function onFaseChange() {
            const fase = document.getElementById('addFase').value;
            const ehSemi = fase === 'Semi-Final';
            document.getElementById('painelSemiAuto').style.display = ehSemi ? 'block' : 'none';
            document.getElementById('painelTimesManual').style.display = ehSemi ? 'none' : 'block';
            if (ehSemi) calcularClassificacaoParaSemi();
        }

        function calcularClassificacaoParaSemi() {
            const mod = document.getElementById('addModalidade').value;
            const ev  = document.getElementById('addEvento').value.trim();
            const preview = document.getElementById('previewSemis');

            const tabela = (dadosGlobais.tabela || []).slice(1);
            const jogos = tabela.filter(row => {
                const modOk     = row[1] === mod;
                const evOk      = !ev || row[0] === ev;
                const temPlacar = row[6] !== '' && row[7] !== '';
                const fase      = (row[10] || '').toLowerCase();
                const naoFinal  = !['semi-final','semi','semifinal','final','disputa 3º lugar','3º lugar'].includes(fase);
                return modOk && evOk && temPlacar && naoFinal;
            });

            if (jogos.length === 0) {
                preview.innerHTML = '<span style="color:#f87171">Nenhum jogo com placar encontrado. Lance os placares da fase de grupos primeiro.</span>';
                return;
            }

            const pts = {}, sg = {}, vit = {};
            jogos.forEach(row => {
                const tA = row[4], tB = row[5];
                const pA = parseInt(row[6])||0, pB = parseInt(row[7])||0;
                [tA,tB].forEach(t => { if (!pts[t]) { pts[t]=0; sg[t]=0; vit[t]=0; } });
                if (pA > pB)      { pts[tA]+=3; vit[tA]++; }
                else if (pB > pA) { pts[tB]+=3; vit[tB]++; }
                else              { pts[tA]+=1; pts[tB]+=1; }
                sg[tA]+=(pA-pB); sg[tB]+=(pB-pA);
            });

            const cl = Object.keys(pts).sort((a,b) => {
                if (pts[b]!==pts[a]) return pts[b]-pts[a];
                if (sg[b]!==sg[a])  return sg[b]-sg[a];
                return vit[b]-vit[a];
            });

            if (cl.length < 4) {
                preview.innerHTML = '<span style="color:#f87171">São necessários 4 times. Encontrados: ' + cl.length + ' (' + cl.join(', ') + ')</span>';
                return;
            }

            window._semiCl = cl;
            preview.innerHTML =
                '<div style="margin-bottom:8px;padding:8px 12px;background:rgba(168,85,247,0.12);border-radius:10px;">' +
                    '<div style="color:#c084fc;font-size:9px;font-weight:800;text-transform:uppercase;margin-bottom:4px;">JOGO 1</div>' +
                    '<div style="font-weight:800;font-size:13px;">' + cl[0] + ' <span style="color:#64748b;font-size:10px;">vs</span> ' + cl[3] + '</div>' +
                    '<div style="color:#64748b;font-size:9px;">1º colocado vs 4º colocado</div>' +
                '</div>' +
                '<div style="padding:8px 12px;background:rgba(168,85,247,0.12);border-radius:10px;">' +
                    '<div style="color:#c084fc;font-size:9px;font-weight:800;text-transform:uppercase;margin-bottom:4px;">JOGO 2</div>' +
                    '<div style="font-weight:800;font-size:13px;">' + cl[1] + ' <span style="color:#64748b;font-size:10px;">vs</span> ' + cl[2] + '</div>' +
                    '<div style="color:#64748b;font-size:9px;">2º colocado vs 3º colocado</div>' +
                '</div>';
        }

        function fecharModalAddJogo() { document.getElementById('modalAddJogo').classList.remove('ativo'); }

        async function confirmarAddJogo() {
            const ev  = document.getElementById('addEvento').value;
            const mod = document.getElementById('addModalidade').value;
            const f   = document.getElementById('addFase').value;
            const d   = document.getElementById('addData').value;
            const h   = document.getElementById('addHorario').value;
            if (!ev || !mod || !d || !h) return alert('Preencha evento, modalidade, data e horário!');

            if (f === 'Semi-Final') {
                const cl = window._semiCl;
                if (!cl || cl.length < 4) return alert('Não foi possível calcular a classificação.');
                function somarMin(hora, min) {
                    let [hh,mm] = hora.split(':').map(Number);
                    mm+=min; while(mm>=60){mm-=60;hh++;}
                    return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
                }
                const h2 = somarMin(h, 20);
                await fetch(URL_GS, { method:'POST', mode:'no-cors', body: JSON.stringify({ aba:'tabela', valores:[ev,mod,d,h, cl[0],cl[3],'','','','','Semi-Final'] }) });
                await fetch(URL_GS, { method:'POST', mode:'no-cors', body: JSON.stringify({ aba:'tabela', valores:[ev,mod,d,h2,cl[1],cl[2],'','','','','Semi-Final'] }) });
            } else {
                const ta = document.getElementById('addEquipeA').value;
                const tb = document.getElementById('addEquipeB').value;
                await fetch(URL_GS, { method:'POST', mode:'no-cors', body: JSON.stringify({ aba:'tabela', valores:[ev,mod,d,h,ta,tb,'','','','',f] }) });
            }
            window.location.reload();
        }

        async function carregarCronograma() {
            try {
                carregarCoresSalvas();
                const res = await fetch(URL_GS); const data = await res.json(); dadosGlobais = data;
                data.equipes.slice(1).forEach(l => { cacheEscudos[l[0]] = { cor1: l[2], cor2: l[3] || l[2], cor3: l[4] || l[2] }; });
                jogosGlobal = data.tabela.slice(1).map((d, i) => ({ 
                    linha: i, dados: d, saltado: false, 
                    autoFilled: (d[10] && (d[10].toLowerCase().includes('final') || d[10].toLowerCase().includes('semi'))) ? true : false 
                }));

                const selE = document.getElementById('selEvento'), selM = document.getElementById('selModalidade');
                [...new Set(jogosGlobal.map(j => j.dados[0]))].filter(Boolean).forEach(e => selE.innerHTML += `<option value="${e}">${e}</option>`);
                [...new Set(jogosGlobal.map(j => j.dados[1]))].filter(Boolean).forEach(m => selM.innerHTML += `<option value="${m}">${m}</option>`);

                aplicarFiltro();
            } catch (e) { console.error(e); }
        }

        carregarCronograma();
    </script>
