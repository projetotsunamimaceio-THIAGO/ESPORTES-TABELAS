<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronograma - Torneio Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Poppins',sans-serif; background-color:#000000; color:#ffffff; min-height:100vh; }
        .gold-text { color:#bf953f; }
        .glass { background:rgba(255,255,255,0.03); backdrop-filter:blur(15px); border:1px solid rgba(191,149,63,0.2); }
        .timeline-item { position:relative; padding-left:2rem; border-left:2px solid rgba(191,149,63,0.3); margin-bottom:1.5rem; }
        .timeline-item::before { content:''; position:absolute; left:-7px; top:8px; width:12px; height:12px; background:#bf953f; border-radius:50%; box-shadow:0 0 10px #bf953f; }
        .tag-mod { font-size:9px; padding:2px 8px; border-radius:4px; text-transform:uppercase; font-weight:800; }

        /* PLACAR */
        .placar-display { cursor:pointer; padding:4px 12px; border-radius:8px; transition:all 0.2s; }
        .placar-display:hover { background:rgba(191,149,63,0.1); }
        .placar-form { display:flex; align-items:center; gap:6px; }
        .placar-form input { 
            width:45px; 
            background:rgba(0,0,0,0.6); 
            border:1px solid rgba(191,149,63,0.4); 
            color:#fff; 
            text-align:center; 
            font-size:1rem; 
            font-weight:800; 
            border-radius:6px;
            padding:4px;
        }
        .placar-form input:focus { border-color:#22c55e; outline:none; }
        .btn-salvar { background:#22c55e; color:#000; border:none; padding:4px 10px; border-radius:6px; font-size:10px; font-weight:800; cursor:pointer; }
        .btn-salvar:hover { background:#16a34a; }
        .msg-salvo { color:#22c55e; font-size:10px; margin-left:6px; }

        .btn-acao { padding:4px 10px; border-radius:6px; font-size:9px; font-weight:700; text-transform:uppercase; cursor:pointer; border:none; transition:all 0.2s; }
        .btn-saltar { background:rgba(239,68,68,0.15); color:#f87171; border:1px solid rgba(239,68,68,0.3); }
        .btn-saltar:hover { background:rgba(239,68,68,0.3); }
        .btn-saltar.ativo { background:rgba(239,68,68,0.4); color:#fff; }
        .jogo-saltado { opacity:0.4; text-decoration:line-through; }
        .a-definir { color:#666; font-style:italic; font-size:10px; }

        .escudo {
            width: 28px;
            height: 36px;
            position: relative;
            flex-shrink: 0;
            clip-path: polygon(50% 100%, 0 75%, 0 0, 100% 0, 100% 75%);
            border-radius: 2px 2px 0 0;
            overflow: hidden;
        }
        .escudo-faixa { position: absolute; top: 0; bottom: 0; width: 33.33%; }
        .escudo-faixa:nth-child(1) { left: 0; }
        .escudo-faixa:nth-child(2) { left: 33.33%; }
        .escudo-faixa:nth-child(3) { left: 66.66%; width: 33.34%; }

        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); z-index:50; display:none; align-items:center; justify-content:center; padding:20px; }
        .modal-overlay.ativo { display:flex; }
        .modal-content { background:#0a0a0a; border:1px solid rgba(191,149,63,0.3); border-radius:24px; padding:32px; max-width:500px; width:100%; max-height:90vh; overflow-y:auto; }
    </style>
<base target="_blank">
</head>
<body class="p-4 md:p-10">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <a href="index.html" onclick="event.preventDefault(); window.location.href='index.html'; return false;" class="gold-text uppercase text-xs tracking-widest font-bold hover:underline">
                <i class="fas fa-arrow-left mr-2"></i> Voltar
            </a>
            <div class="text-right">
                <h1 class="text-3xl font-black italic tracking-tighter uppercase">CRONOGRAMA <span class="gold-text">GERAL</span></h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest">Clique no placar para editar</p>
            </div>
        </div>

        <div class="flex gap-3 mb-6 flex-wrap">
            <button onclick="abrirModalAddJogo()" class="btn-acao" style="background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.3);">
                <i class="fas fa-plus mr-1"></i> Adicionar Jogo
            </button>
            <button onclick="toggleSaltados()" class="btn-acao" style="background:rgba(100,116,139,0.15);color:#94a3b8;border:1px solid rgba(100,116,139,0.3);">
                <i class="fas fa-eye mr-1"></i> <span id="txtToggleSaltados">Mostrar Saltados</span>
            </button>
            <button onclick="window.location.reload()" class="btn-acao" style="background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.3);">
                <i class="fas fa-sync mr-1"></i> Atualizar
            </button>
        </div>

        <div id="cronogramaLista">
            <div class="text-center py-20 animate-pulse">
                <i class="fas fa-spinner fa-spin text-3xl gold-text mb-4"></i>
                <p class="text-xs uppercase tracking-widest text-slate-500">Carregando jogos...</p>
            </div>
        </div>
    </div>

    <div id="modalAddJogo" class="modal-overlay">
        <div class="modal-content">
            <h3 class="text-xl font-black uppercase tracking-tighter mb-6 italic gold-text">
                <i class="fas fa-plus-circle mr-2"></i>Adicionar Jogo
            </h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase text-slate-500 font-bold">Modalidade</label>
                    <select id="addModalidade" class="w-full p-3 mt-1 rounded-xl bg-black/60 border border-amber-500/30 text-white"></select>
                </div>
                <div>
                    <label class="text-[10px] uppercase text-slate-500 font-bold">Fase</label>
                    <select id="addFase" class="w-full p-3 mt-1 rounded-xl bg-black/60 border border-amber-500/30 text-white">
                        <option value="Fase de Grupos">Fase de Grupos</option>
                        <option value="Quartas de Final">Quartas de Final</option>
                        <option value="Semi-Final">Semi-Final</option>
                        <option value="Final">Final</option>
                        <option value="Disputa 3º Lugar">Disputa 3º Lugar</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] uppercase text-slate-500 font-bold">Data</label>
                    <input type="date" id="addData" class="w-full p-3 mt-1 rounded-xl bg-black/60 border border-amber-500/30 text-white">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-slate-500 font-bold">Horário</label>
                    <input type="time" id="addHorario" class="w-full p-3 mt-1 rounded-xl bg-black/60 border border-amber-500/30 text-white">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-slate-500 font-bold">Equipe A <span class="text-slate-600">(opcional)</span></label>
                    <select id="addEquipeA" class="w-full p-3 mt-1 rounded-xl bg-black/60 border border-amber-500/30 text-white">
                        <option value="">A DEFINIR</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] uppercase text-slate-500 font-bold">Equipe B <span class="text-slate-600">(opcional)</span></label>
                    <select id="addEquipeB" class="w-full p-3 mt-1 rounded-xl bg-black/60 border border-amber-500/30 text-white">
                        <option value="">A DEFINIR</option>
                    </select>
                </div>
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="fecharModalAddJogo()" class="flex-1 py-3 rounded-xl bg-slate-800 text-white text-xs font-bold uppercase">Cancelar</button>
                <button onclick="confirmarAddJogo()" class="flex-1 py-3 rounded-xl bg-gradient-to-r from-amber-600 to-amber-500 text-black text-xs font-bold uppercase">Adicionar</button>
            </div>
        </div>
    </div>

    <script>
        const URL_GS = "https://script.google.com/macros/s/AKfycbxiJPnyx4kC51xJCL26LoPkSumLkE8rHAn4f6DbF66Acy2dLiZbp_-JZjhYJSv6jXQa/exec";

        let cacheEscudos = {};
        let jogosGlobal = [];
        let dadosGlobais = {};
        let mostrarSaltados = false;

        function limparHora(valor) {
            if (!valor || valor === '') return '--:--';
            const s = String(valor).trim();
            const match = s.match(/^(\d{1,2}):\d{2}/);
            if (match) {
                const hora = match[1].padStart(2, '0');
                const minutos = s.match(/:\d{2}/)[0].slice(1);
                return hora + ':' + minutos;
            }
            if (!isNaN(s) && s.includes('.')) {
                const totalMinutos = Math.round(parseFloat(s) * 24 * 60);
                const h = String(Math.floor(totalMinutos / 60)).padStart(2, '0');
                const m = String(totalMinutos % 60).padStart(2, '0');
                return h + ':' + m;
            }
            return s;
        }

        function limparData(valor) {
            if (!valor || valor === '') return '';
            const s = String(valor).trim();
            if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
            const matchBR = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
            if (matchBR) {
                let dia = matchBR[1].padStart(2, '0');
                let mes = matchBR[2].padStart(2, '0');
                let ano = matchBR[3];
                if (ano.length === 2) ano = parseInt(ano) >= 50 ? '19' + ano : '20' + ano;
                return ano + '-' + mes + '-' + dia;
            }
            const matchUS = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
            if (matchUS) {
                let mes = matchUS[1].padStart(2, '0');
                let dia = matchUS[2].padStart(2, '0');
                let ano = matchUS[3];
                return ano + '-' + mes + '-' + dia;
            }
            if (s.includes('T')) return s.substring(0, 10);
            return s;
        }

        function formatarDataExibicao(dataStr) {
            try {
                const [ano, mes, dia] = dataStr.split('-').map(Number);
                const d = new Date(ano, mes - 1, dia);
                return d.toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });
            } catch(e) { return dataStr; }
        }

        function criarEscudo(nomeTime) {
            if (!nomeTime) return '';
            const escudo = cacheEscudos[nomeTime.trim()];
            if (!escudo) return '';
            return `
                <div class="escudo" title="${nomeTime}">
                    <div class="escudo-faixa" style="background-color:${escudo.cor1};"></div>
                    <div class="escudo-faixa" style="background-color:${escudo.cor2};"></div>
                    <div class="escudo-faixa" style="background-color:${escudo.cor3};"></div>
                </div>
            `;
        }

        function formatarPlacar(valorA, valorB) {
            const strA = String(valorA !== undefined && valorA !== null ? valorA : '').trim();
            const strB = String(valorB !== undefined && valorB !== null ? valorB : '').trim();
            
            if (strA === '' && strB === '') return '-';
            // Se um dos valores for preenchido (inclusive 0), exibe o placar
            return `${strA} x ${strB}`;
        }

        function formatarNomeTime(nome) {
            if (!nome || String(nome).trim() === '') return '<span class="a-definir">A DEFINIR</span>';
            return String(nome).trim();
        }

        window.editarPlacar = function(linhaIdx) {
            const jogo = jogosGlobal.find(j => j.linha === linhaIdx);
            if (!jogo || jogo.saltado) return;

            const container = document.getElementById('placar-container-' + linhaIdx);
            if (!container) return;

            const valA = jogo.dados[5];
            const valB = jogo.dados[6];
            
            // Permite que o 0 apareça no input
            const placarA = (valA === undefined || valA === null || valA === '') ? '' : valA;
            const placarB = (valB === undefined || valB === null || valB === '') ? '' : valB;

            container.innerHTML = `
                <div class="placar-form" id="form-placar-${linhaIdx}">
                    <input type="number" id="inp-a-${linhaIdx}" value="${placarA}" min="0" placeholder="0">
                    <span style="color:#666;">x</span>
                    <input type="number" id="inp-b-${linhaIdx}" value="${placarB}" min="0" placeholder="0">
                    <button type="button" class="btn-salvar" onclick="salvarPlacar(${linhaIdx})">
                        <i class="fas fa-check"></i>
                    </button>
                </div>
            `;

            setTimeout(() => {
                const inp = document.getElementById('inp-a-' + linhaIdx);
                if (inp) inp.focus();
            }, 10);
        };

        window.salvarPlacar = async function(linhaIdx) {
            const inpA = document.getElementById('inp-a-' + linhaIdx);
            const inpB = document.getElementById('inp-b-' + linhaIdx);
            const container = document.getElementById('placar-container-' + linhaIdx);

            if (!inpA || !inpB || !container) return;

            // Correção: Se o campo estiver vazio, envia 0, mas agora aceita o valor 0 digitado
            const novoA = inpA.value === '' ? 0 : parseInt(inpA.value);
            const novoB = inpB.value === '' ? 0 : parseInt(inpB.value);

            const jogo = jogosGlobal.find(j => j.linha === linhaIdx);
            if (!jogo) return;

            jogo.dados[5] = novoA;
            jogo.dados[6] = novoB;

            container.innerHTML = '<span style="color:#bf953f;"><i class="fas fa-spinner fa-spin"></i></span>';

            try {
                const linhaSheets = linhaIdx + 2;

                await fetch(URL_GS, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        aba: 'tabela',
                        acao: 'atualizar',
                        linha: linhaSheets,
                        colunaPlacarA: 6,
                        colunaPlacarB: 7,
                        placarA: novoA,
                        placarB: novoB
                    })
                });

                const texto = formatarPlacar(novoA, novoB);
                container.innerHTML = `
                    <span class="placar-display" onclick="editarPlacar(${linhaIdx})">
                        <span class="text-lg font-black">${texto}</span>
                    </span>
                    <span class="msg-salvo"><i class="fas fa-check"></i></span>
                `;

                setTimeout(() => {
                    container.innerHTML = `
                        <span class="placar-display" onclick="editarPlacar(${linhaIdx})">
                            <span class="text-lg font-black">${texto}</span>
                        </span>
                    `;
                }, 2000);

            } catch (e) {
                container.innerHTML = '<span class="text-red-500">Erro</span>';
                setTimeout(() => renderizar(jogosGlobal), 1000);
            }
        };

        function toggleSaltar(linhaIdx) {
            const jogo = jogosGlobal.find(j => j.linha === linhaIdx);
            if (!jogo) return;
            jogo.saltado = !jogo.saltado;
            renderizar(jogosGlobal);
        }

        function toggleSaltados() {
            mostrarSaltados = !mostrarSaltados;
            document.getElementById('txtToggleSaltados').textContent = mostrarSaltados ? 'Ocultar Saltados' : 'Mostrar Saltados';
            renderizar(jogosGlobal);
        }

        function abrirModalAddJogo() {
            const modal = document.getElementById('modalAddJogo');
            const selectMod = document.getElementById('addModalidade');

            const modalidades = (dadosGlobais.esportes || []).slice(1).map(e => e[0]);
            selectMod.innerHTML = modalidades.map(m => `<option value="${m}">${m}</option>`).join('');

            atualizarSelectsEquipes();

            if (jogosGlobal.length > 0) {
                const ultimo = jogosGlobal[jogosGlobal.length - 1];
                document.getElementById('addData').value = ultimo.dados[1] || '';
                document.getElementById('addHorario').value = ultimo.dados[2] || '17:00';
            } else {
                document.getElementById('addData').value = new Date().toISOString().split('T')[0];
                document.getElementById('addHorario').value = '17:00';
            }

            selectMod.onchange = atualizarSelectsEquipes;
            modal.classList.add('ativo');
        }

        function atualizarSelectsEquipes() {
            const mod = document.getElementById('addModalidade').value;
            const equipes = (dadosGlobais.equipes || []).slice(1)
                .filter(e => e[1] === mod)
                .map(e => e[0]);
            const optsEquipes = equipes.map(e => `<option value="${e}">${e}</option>`).join('');
            document.getElementById('addEquipeA').innerHTML = '<option value="">A DEFINIR</option>' + optsEquipes;
            document.getElementById('addEquipeB').innerHTML = '<option value="">A DEFINIR</option>' + optsEquipes;
        }

        function fecharModalAddJogo() {
            document.getElementById('modalAddJogo').classList.remove('ativo');
        }

        async function confirmarAddJogo() {
            const mod = document.getElementById('addModalidade').value;
            const fase = document.getElementById('addFase').value;
            const data = document.getElementById('addData').value;
            const horario = document.getElementById('addHorario').value;
            const tA = document.getElementById('addEquipeA').value;
            const tB = document.getElementById('addEquipeB').value;

            if (!data || !horario) return alert("Preencha data e horário!");
            if (tA && tB && tA === tB) return alert("As equipes devem ser diferentes!");

            try {
                await fetch(URL_GS, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        aba: 'tabela',
                        valores: [mod, data, horario, tA, tB, '', '']
                    })
                });

                fecharModalAddJogo();
                alert('Jogo adicionado! Atualizando...');
                window.location.reload();

            } catch (e) {
                alert("Erro ao salvar. Tente novamente.");
            }
        }

        async function carregarCronograma() {
            try {
                const res = await fetch(URL_GS);
                const data = await res.json();
                dadosGlobais = data;

                const equipesRaw = (data.equipes || []).slice(1);
                equipesRaw.forEach(linha => {
                    const nome = String(linha[0] || '').trim();
                    const cor1 = String(linha[2] || '').trim();
                    const cor2 = String(linha[3] || '').trim();
                    const cor3 = String(linha[4] || '').trim();
                    if (nome && cor1) {
                        cacheEscudos[nome] = {
                            cor1: cor1,
                            cor2: cor2 || cor1,
                            cor3: cor3 || cor1
                        };
                    }
                });

                const jogosRaw = (data.tabela || []);
                jogosGlobal = jogosRaw.slice(1).map((dados, idx) => ({
                    linha: idx,
                    dados: dados,
                    saltado: false
                }));

                if (jogosGlobal.length === 0) {
                    document.getElementById('cronogramaLista').innerHTML =
                        '<p class="text-center text-slate-500 py-20">Nenhum jogo agendado ainda.</p>';
                    return;
                }

                renderizar(jogosGlobal);
            } catch (e) {
                console.error(e);
                document.getElementById('cronogramaLista').innerHTML =
                    '<p class="text-red-500 text-center">Erro ao conectar com o banco de dados.</p>';
            }
        }

        const PALETA_MODALIDADES = [
            { bg:'rgba(191,149,63,0.18)', text:'#bf953f', border:'rgba(191,149,63,0.4)' },
            { bg:'rgba(34,197,94,0.15)', text:'#22c55e', border:'rgba(34,197,94,0.4)' },
            { bg:'rgba(59,130,246,0.15)', text:'#60a5fa', border:'rgba(59,130,246,0.4)' },
            { bg:'rgba(239,68,68,0.15)', text:'#f87171', border:'rgba(239,68,68,0.4)' },
            { bg:'rgba(168,85,247,0.15)', text:'#c084fc', border:'rgba(168,85,247,0.4)' },
            { bg:'rgba(234,179,8,0.15)', text:'#facc15', border:'rgba(234,179,8,0.4)' },
            { bg:'rgba(20,184,166,0.15)', text:'#2dd4bf', border:'rgba(20,184,166,0.4)' },
            { bg:'rgba(249,115,22,0.15)', text:'#fb923c', border:'rgba(249,115,22,0.4)' },
        ];
        let mapaCoresModalidade = {};
        let contadorCores = 0;

        function corDaModalidade(modalidade) {
            const chave = String(modalidade || '').trim().toLowerCase();
            if (!chave) return PALETA_MODALIDADES[0];
            if (!mapaCoresModalidade[chave]) {
                mapaCoresModalidade[chave] = PALETA_MODALIDADES[contadorCores % PALETA_MODALIDADES.length];
                contadorCores++;
            }
            return mapaCoresModalidade[chave];
        }

        function renderizar(jogos) {
            const jogosVisiveis = mostrarSaltados ? jogos : jogos.filter(j => !j.saltado);

            const porData = {};
            jogosVisiveis.forEach(j => {
                const dataKey = limparData(j.dados[1]);
                if (!dataKey) return;
                if (!porData[dataKey]) porData[dataKey] = [];
                porData[dataKey].push(j);
            });

            const datasOrdenadas = Object.keys(porData).sort();

            if (datasOrdenadas.length === 0) {
                document.getElementById('cronogramaLista').innerHTML =
                    '<p class="text-center text-slate-500 py-20">Nenhum jogo para exibir.</p>';
                return;
            }

            let html = '';
            datasOrdenadas.forEach(dataKey => {
                const jogosDoDia = porData[dataKey].sort((a, b) => 
                    limparHora(a.dados[2]).localeCompare(limparHora(b.dados[2]))
                );

                html += `
                    <div class="mb-12">
                        <div class="flex items-center gap-4 mb-8">
                            <div class="h-[1px] flex-1 bg-white/10"></div>
                            <h2 class="text-sm font-bold gold-text uppercase tracking-[0.3em] bg-black px-4 italic">
                                <i class="far fa-calendar-alt mr-2"></i>${formatarDataExibicao(dataKey)}
                            </h2>
                            <div class="h-[1px] flex-1 bg-white/10"></div>
                        </div>
                        <div class="space-y-3">
                `;

                jogosDoDia.forEach(j => {
                    const saltadoClass = j.saltado ? 'jogo-saltado' : '';
                    const c = corDaModalidade(j.dados[0]);
                    const nomeA = formatarNomeTime(j.dados[3]);
                    const nomeB = formatarNomeTime(j.dados[4]);
                    const temTimeA = j.dados[3] && String(j.dados[3]).trim() !== '';
                    const temTimeB = j.dados[4] && String(j.dados[4]).trim() !== '';
                    const placarTexto = formatarPlacar(j.dados[5], j.dados[6]);

                    html += `
                        <div class="timeline-item ${saltadoClass}">
                            <div class="glass p-5 rounded-2xl flex flex-wrap md:flex-nowrap items-center justify-between gap-4">
                                <div class="w-full md:w-auto text-center md:text-left">
                                    <div class="text-xl font-black gold-text leading-none mb-1">${limparHora(j.dados[2])}</div>
                                    <span class="tag-mod" style="background:${c.bg};color:${c.text};border:1px solid ${c.border};">${j.dados[0] || ''}</span>
                                </div>
                                <div class="flex-1 flex items-center justify-center gap-3">
                                    <div class="flex items-center gap-2" style="min-width:0;">
                                        <span class="font-bold uppercase text-[11px] truncate" style="max-width:120px;">${nomeA}</span>
                                        ${temTimeA ? criarEscudo(j.dados[3]) : '<div style="width:28px;"></div>'}
                                    </div>
                                    <div id="placar-container-${j.linha}" class="placar-wrapper">
                                        <span class="placar-display" onclick="editarPlacar(${j.linha})">
                                            <span class="text-lg font-black">${placarTexto}</span>
                                        </span>
                                    </div>
                                    <div class="flex items-center gap-2" style="min-width:0;">
                                        ${temTimeB ? criarEscudo(j.dados[4]) : '<div style="width:28px;"></div>'}
                                        <span class="font-bold uppercase text-[11px] truncate" style="max-width:120px;">${nomeB}</span>
                                    </div>
                                </div>
                                <div class="w-full md:w-auto flex justify-center">
                                    <button onclick="toggleSaltar(${j.linha})" class="btn-acao btn-saltar ${j.saltado ? 'ativo' : ''}">
                                        <i class="fas ${j.saltado ? 'fa-undo' : 'fa-forward'}"></i> ${j.saltado ? 'RESTAURAR' : 'SALTAR'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });

                html += '</div></div>';
            });

            document.getElementById('cronogramaLista').innerHTML = html;
        }

        carregarCronograma();
    </script>
</body>
</html>
